# Curated metadata for go.beyondpandora.com.
# generate.py merges this with the live Traefik subdomain list.
#
# Layout: sections (display order) + per-host service overrides.
# Any subdomain present in Traefik but missing from `services` below is still
# emitted, slotted into `default_section`, with a friendly default name.
#
# Icons: { slug: foo }       → CDN logo from homarr-labs/dashboard-icons
#        { svg: name, tone } → Inline Lucide icon, tone=sky|teal|gold
# If both → tries CDN first, falls back to the SVG on 404 (handled in HTML).

sections:
  - { id: home,           label: "Home",            accent: sky  }
  - { id: dashboards,     label: "Dashboards",      accent: sky  }
  - { id: projects-ai,    label: "Projects & AI",   accent: teal }
  - { id: apps,           label: "Apps",            accent: gold }
  - { id: automation,     label: "Automation",      accent: sky  }
  - { id: media,          label: "Media",           accent: teal }
  - { id: tools,          label: "Search & Tools",  accent: gold }
  - { id: websites,       label: "Websites",        accent: teal }
  - { id: infrastructure, label: "Infrastructure",  accent: sky  }
  - { id: uncategorized,  label: "Uncategorized",   accent: gold }

default_section: uncategorized

