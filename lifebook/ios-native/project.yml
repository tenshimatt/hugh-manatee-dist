name: HughManatee
options:
  bundleIdPrefix: com.beyondpandora
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_CFBundleDisplayName: "Hugh Manatee"
    INFOPLIST_KEY_UIRequiredDeviceCapabilities: ["arm64"]
    INFOPLIST_KEY_UISupportedInterfaceOrientations: ["UIInterfaceOrientationPortrait"]
    INFOPLIST_KEY_NSMicrophoneUsageDescription: "Hugh needs the microphone so you can talk to him."

targets:
  HughManatee:
    type: application
    platform: iOS
    sources:
      - HughManatee
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.beyondpandora.hughmanatee
        INFOPLIST_KEY_UIAppFonts: []
        INFOPLIST_KEY_UILaunchStoryboardName: ""
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: []
    dependencies:
      - package: GRDB
      - package: LiveKit

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: 6.29.0
  LiveKit:
    url: https://github.com/livekit/client-sdk-swift
    from: 2.0.0
