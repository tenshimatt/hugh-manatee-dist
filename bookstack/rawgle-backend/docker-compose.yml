version: '3.8'

services:
  # RAWGLE Backend API
  rawgle-backend:
    build:
      context: .
      target: development
    container_name: rawgle-backend
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=development
      - PORT=8000
      - DATABASE_URL=postgresql://rawgle_user:rawgle_password@postgres:5432/rawgle_db
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=rawgle_db
      - DB_USER=rawgle_user
      - DB_PASSWORD=rawgle_password
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=super-secure-jwt-secret-for-development-change-in-production
      - JWT_REFRESH_SECRET=super-secure-refresh-secret-for-development-change-in-production
      - EMAIL_API_KEY=test-sendgrid-api-key
      - EMAIL_FROM=noreply@rawgle.com
      - FRONTEND_URL=http://localhost:3000
      - CORS_ORIGIN=http://localhost:3000
      - SESSION_SECRET=super-secure-session-secret-for-development
    volumes:
      - .:/app
      - /app/node_modules
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rawgle-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: rawgle-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: rawgle_db
      POSTGRES_USER: rawgle_user
      POSTGRES_PASSWORD: rawgle_password
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - rawgle-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rawgle_user -d rawgle_db"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Redis Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: rawgle-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - rawgle-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Adminer (Database Admin UI)
  adminer:
    image: adminer:latest
    container_name: rawgle-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: dracula
    networks:
      - rawgle-network
    restart: unless-stopped
    profiles:
      - admin

  # Redis Commander (Redis Admin UI)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: rawgle-redis-commander
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
      HTTP_USER: admin
      HTTP_PASSWORD: admin
    networks:
      - rawgle-network
    restart: unless-stopped
    profiles:
      - admin

networks:
  rawgle-network:
    driver: bridge
    name: rawgle-network

volumes:
  postgres_data:
    driver: local
    name: rawgle-postgres-data
  redis_data:
    driver: local
    name: rawgle-redis-data