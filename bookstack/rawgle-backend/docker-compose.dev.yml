version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rawgle-postgres-dev
    environment:
      POSTGRES_DB: rawgle_db
      POSTGRES_USER: rawgle_user
      POSTGRES_PASSWORD: rawgle_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rawgle_user -d rawgle_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rawgle-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: rawgle-backend-dev
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://rawgle_user:rawgle_password@postgres:5432/rawgle_db
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    name: rawgle_postgres_data
  redis_data:
    name: rawgle_redis_data