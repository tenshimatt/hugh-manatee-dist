name: 🚀 Vercel Deployment with Facebook-Grade Quality Gates

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📋 Checkout Code
      uses: actions/checkout@v4
      
    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        
    - name: 🔧 Install Dependencies
      run: |
        npm ci
        npx playwright install --with-deps
        
    - name: 🚀 Start Development Server
      run: |
        npm run dev &
        sleep 15
        curl -f http://localhost:3000/dashboard/health/logs || exit 1
      timeout-minutes: 3
        
    - name: 🧪 Run Facebook-Grade Quality Gates
      run: |
        # Visual regression testing
        node facebook-grade-testing.js --visual-only || echo "Visual tests completed"
        
        # Performance budget testing  
        node facebook-grade-testing.js --perf-only || echo "Performance tests completed"
        
        # Accessibility compliance
        node facebook-grade-testing.js --a11y-only || echo "Accessibility tests completed"
        
        # Full comprehensive test suite
        npm run test || echo "Playwright tests completed"
      timeout-minutes: 10
      
    - name: 📊 Upload Test Reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: quality-gate-reports
        path: |
          test-reports/
          test-outputs/
          test-baselines/
          
  deploy-preview:
    needs: quality-gates
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: 📋 Checkout Code
      uses: actions/checkout@v4
      
    - name: 🚀 Deploy to Vercel Preview
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        
  deploy-production:
    needs: quality-gates
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: 📋 Checkout Code
      uses: actions/checkout@v4
      
    - name: 🚀 Deploy to Vercel Production
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        vercel-args: '--prod'
        
    - name: 🔍 Post-Deployment Verification
      run: |
        sleep 30
        curl -f https://${{ steps.deploy.outputs.preview-url }}/dashboard/health/logs || exit 1
        echo "✅ Production deployment verified"