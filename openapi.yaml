openapi: 3.0.1
info:
  title: Pandora Executor API
  description: Run Python code securely on EC2 and return the output.
  version: "1.0.0"
servers:
  - url: https://api.beyondpandora.com
    description: Secure EC2 gateway
paths:
  /chatgpt_submit:
    post:
      summary: Execute Python code
      operationId: runCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  description: Python code to execute
      responses:
        "200":
          description: Execution result
          content:
            application/json:
              schema:
                type: object
                properties:
                  output:
                    type: string
components: {}
