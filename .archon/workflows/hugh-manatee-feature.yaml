      class (PII / pet health / public). Cardinality on relationships.

      Same canvas + element rules + brand colours.
      Always write the data diagram (always applicable).

      Output JSON: { "written": "<path>", "applicable": true }
    output_format:
      type: object
      properties:
        written:    { type: string }
        applicable: { type: boolean }
      required: [written, applicable]

