      IT TO A FILE at:
      docs/architecture/$prd-extend.output.slug-technology.excalidraw

      Use the same Excalidraw envelope (source: ".../technology").

      Show in elements: hosts/runtimes (Expo / React Native, Cloudflare Worker,
      ElevenLabs CAI, LiveKit WebRTC, expo-sqlite, TestFlight / App Store,
