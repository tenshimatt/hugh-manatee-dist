      feature. A diagram is applicable when it adds non-trivial information.
      If the answer would be a near-empty diagram (3-5 boxes, no real
      structure to argue), set `applicable: false`, do NOT write a file, and
      return early. Skip work, save tokens. We trust the model to make this
      call honestly per feature.

      ## CONTEXT DELIVERED INLINE (do NOT Read these files)
      The plan summary, PRD section, and mission scope are summarised in
      this prompt by the orchestrator. Do NOT Read mission.md, factory-rules.md,
      CLAUDE.md, or docs/prd.md — they're already accounted for. Read ONLY
      the plan markdown if you need full task detail.

      Plan markdown path: docs/architecture/$prd-extend.output.slug.md
      PRD section: $prd-extend.output.prd_section
      Slug: $prd-extend.output.slug

      Generate the SECURITY dimension Excalidraw diagram ONLY IF this
      feature touches: auth, RLS, PII, payments, secrets, third-party
      identity, file uploads, or anything in $security-review.output.

      If applicable: WRITE IT TO A FILE at
      docs/architecture/$prd-extend.output.slug-security.excalidraw
      using the same Excalidraw envelope (source: ".../security").
      Show trust boundaries (anon vs authed vs admin), auth flows,
      secrets/keys and where they live, attack surfaces.

      If NOT applicable: do NOT create any file.

      Output JSON: { "written": "<path or empty string>", "applicable": bool }
    output_format:
      type: object
      properties:
        written:    { type: string }
        applicable: { type: boolean }
      required: [written, applicable]

  - id: excalidraw-integration
    depends_on: [plan]
    provider: deepseek
    context: fresh
    model: deepseek-v4-pro
    prompt: |
      ## SKILL TO USE
      Apply the `.claude/skills/excalidraw-diagram` skill (Cole Medin's
      excalidraw-diagram-skill). Read its SKILL.md + references/color-palette.md
      + references/element-templates.md before designing. Follow its
      methodology: diagrams ARGUE visually (not display), use real evidence
      artefacts (actual API names, real component names, real code snippets
      where relevant), and respect Hugh Manatee's brand palette from color-palette.md
      (NOT the inline list below — color-palette.md is the source of truth).

      ## APPLICABILITY DISCIPLINE (token control)
      Before generating the diagram, decide whether it's APPLICABLE to this
      feature. A diagram is applicable when it adds non-trivial information.
      If the answer would be a near-empty diagram (3-5 boxes, no real
      structure to argue), set `applicable: false`, do NOT write a file, and
      return early. Skip work, save tokens. We trust the model to make this
      call honestly per feature.

      ## CONTEXT DELIVERED INLINE (do NOT Read these files)
      The plan summary, PRD section, and mission scope are summarised in
      this prompt by the orchestrator. Do NOT Read mission.md, factory-rules.md,
      CLAUDE.md, or docs/prd.md — they're already accounted for. Read ONLY
      the plan markdown if you need full task detail.

      Plan markdown path: docs/architecture/$prd-extend.output.slug.md
      PRD section: $prd-extend.output.prd_section
      Slug: $prd-extend.output.slug

      Generate the INTEGRATION dimension Excalidraw diagram ONLY IF
      this feature crosses a system boundary: webhooks, third-party
      APIs (OpenRouter, Plane, App Store Connect, Apple Sign-in, OSM,
      etc.), inbound integrations, Edge Function ↔ external service.

      If applicable: WRITE IT TO A FILE at
      docs/architecture/$prd-extend.output.slug-integration.excalidraw
      using the same Excalidraw envelope (source: ".../integration").
      Sequence-style flow showing message order, retries, idempotency
      keys, failure modes.

      If NOT applicable: do NOT create any file.

      Output JSON: { "written": "<path or empty string>", "applicable": bool }
    output_format:
      type: object
      properties:
        written:    { type: string }
        applicable: { type: boolean }
      required: [written, applicable]

  # ──────────────────────────────────────────────────────────────
  # PHASE 5 — HUMAN GATE (review plan + reviewer concerns + diagrams)
  # ──────────────────────────────────────────────────────────────

  - id: gate-plan
    depends_on:
      - architect-review
      - security-review
      - excalidraw-business
      - excalidraw-data
      - excalidraw-application
      - excalidraw-technology
      - excalidraw-security
      - excalidraw-integration
    timeout: 86400000
    bash: |
      set +e
      SLUG="$prd-extend.output.slug"
      bash .archon/scripts/wait-for-approval.sh plan \
        "Plan + reviewer concerns + BDATSI diagrams ready. Plan: docs/architecture/$SLUG.md. Diagrams in docs/architecture/. Approve to file Plane sub-tickets and start tests-first."
      exit 0

  # ──────────────────────────────────────────────────────────────
  # PHASE 6 — PLANE TICKETS (one per task, all citing §X.Y)
  # ──────────────────────────────────────────────────────────────

  - id: plane-tickets
    depends_on: [gate-plan]
    provider: deepseek
    context: fresh
    model: deepseek-v4-flash
    prompt: |
      Read the plan at docs/architecture/$prd-extend.output.slug.md.

      For EACH task in the plan, create a Plane ticket by piping a JSON
      spec into bash .archon/scripts/plane-create-ticket.sh — see that
      script for the schema. Every ticket MUST have prd_section set to
      $prd-extend.output.prd_section.

      Map plan-task severity → Plane priority:
        blocker → urgent
        critical → high
        normal → medium
        nit → low

      After creating all tickets, output the list of created sequence
      IDs as JSON.
    output_format:
      type: object
      properties:
        tickets:
          type: array
          items:
            type: object
            properties:
              sequence_id: { type: integer }
              name:        { type: string }
            required: [sequence_id, name]
      required: [tickets]

  # ──────────────────────────────────────────────────────────────
  # PHASE 7 — TEST FIRST (Playwright + Maestro)
  # ──────────────────────────────────────────────────────────────

  # Rail #2 — test-first: claude-sonnet-4-6 (tool-use loop), max_turns:20,
  # imperative prompt (YOUR ONLY JOB IS TO INVOKE THE WRITE TOOL), no output_format.
  # DeepSeek does NOT reliably call Write on the first pass — Claude required here.
  - id: test-first
    depends_on: [plane-tickets]
    provider: claude
    context: fresh
    model: claude-sonnet-4-6
    max_turns: 20
    prompt: |
      Write Playwright tests BEFORE any implementation, against the
      acceptance criteria from the plan.

      ## YOUR ONLY JOB IS TO INVOKE THE WRITE TOOL.

      For each ticket in the plan, call the Write tool with path
      `tests/e2e/<slug>-<seq>.spec.ts` and content that asserts the
      acceptance criteria. Tests MUST fail right now because nothing is
      implemented yet.

      Do NOT skip Writing because "tests already exist" — they don't.
      Do NOT respond with a JSON summary instead of doing the work.
      Do NOT abbreviate the spec content. Each Write call should produce
      a complete, runnable Playwright test file.

      ## PLAYWRIGHT PATTERNS — REQUIRED READING BEFORE WRITING TESTS (Bug HM-B)
      This is a React Native app. When writing tests that need multiple auth contexts:
        - Use `browser.newContext()` or the `request` fixture's `newContext()` method.
        - NEVER access `(context as any)._playwright` or `(apiContext as any)._playwright`.
          The `_playwright` private property does NOT exist in Playwright — any test
          that accesses it will throw `TypeError: Cannot read properties of undefined
          (reading 'request')` immediately.
        - For multi-user scenarios: declare a second `{ browser }` fixture and call
          `browser.newContext({ extraHTTPHeaders: {...} })` directly.
        - For API-only multi-context: use `import { request as playwrightRequest } from
          '@playwright/test'; const ctx = await playwrightRequest.newContext({...})`.

      ## STACK CONSTRAINT (same as plan — belt-and-suspenders)
      Tests must target the React Native app or the Cloudflare Worker endpoint.
      Do NOT write tests for web pages, Next.js routes, or REST APIs that don't
      exist in this repo. If the plan described something web-shaped, test only
      the React Native screen or Worker endpoint that maps to it.

      ## PACKAGE.JSON REQUIRED (Bug HM-E)
      Before writing any spec files, check whether a `package.json` exists
      at the repo root. If it does NOT exist, Write one now:
        path: `package.json`
        content: `{"name":"hugh-manatee-tests","private":true,"devDependencies":{"@playwright/test":"^1.44.0"}}`
      Then run `bun install` so the playwright binary is available.
      This is MANDATORY — validate will fail without it.

      After all Writes, run `bun x playwright test --project=iphone-15
      tests/e2e/<your-files>` and confirm RED. If green/skipped, fix.

      Print a final line: `DONE: <N> spec files written` so the gate can verify.
      The next node (gate-test-first) WILL fail the workflow if 0 files
      appear in tests/e2e/.

      Hard cap 20 turns.

  # Rail #3 — fail fast if test-first didn't actually write specs to disk.
  # Saves ~95min of implement thrashing on an empty NEW_TESTS variable.
  - id: gate-test-first
    depends_on: [test-first]
    bash: |
      set +e
      NEW=$(git ls-files --others --exclude-standard tests/e2e | grep '\.spec\.ts$' | wc -l)
      if [[ "$NEW" -eq 0 ]]; then
        # also check newly-added on-branch case (less common, defensive)
        NEW=$(git diff --name-only --diff-filter=A origin/main...HEAD -- 'tests/e2e/*.spec.ts' 2>/dev/null | wc -l)
      fi
      if [[ "$NEW" -eq 0 ]]; then
        echo "✗ test-first wrote 0 spec files — halting before implement burns time/tokens" >&2
        exit 5
      fi
      echo "test-first OK: $NEW new spec file(s) on disk"

  # ──────────────────────────────────────────────────────────────
  # PHASE 8 — IMPLEMENT (PIV loop until tests pass)
  # ──────────────────────────────────────────────────────────────

  # Rail #4 — implement: claude-sonnet-4-6 (tool-use loop), max_turns:60,
  # bail-on-empty NEW_TESTS at top (defence in depth behind gate-test-first).
  - id: implement
    depends_on: [gate-test-first]
    provider: claude
    context: fresh
    model: claude-sonnet-4-6
    max_turns: 60
    prompt: |
      Implement the feature against the failing tests.

      ## SAFETY RAIL — bail if no new tests were added (defence in depth)
      Run this first. If empty, exit immediately with a non-zero status:
        NEW_TESTS=$(git ls-files --others --exclude-standard tests/e2e | grep '\.spec\.ts$' | tr '\n' ' ')
        if [[ -z "$NEW_TESTS" ]]; then
          NEW_TESTS=$(git diff --name-only --diff-filter=A origin/main...HEAD -- 'tests/e2e/*.spec.ts' | tr '\n' ' ')
        fi
        if [[ -z "$NEW_TESTS" ]]; then
          echo "✗ no new tests — refusing to run implement against full suite" >&2
          exit 5
        fi
      Do NOT proceed without NEW_TESTS being a non-empty list.

      ## CONTEXT EFFICIENCY (CRITICAL — token discipline)
      You are running in a sub-agent context. To minimise tokens:
        - Do NOT Read mission.md, factory-rules.md, CLAUDE.md, docs/prd.md.
          You don't need them for implementation. They're for review.
        - Do NOT Read docs/architecture/*.md. The plan is summarised below.
        - Read ONLY the files referenced in the failing test's selector
          assertions or imports (typically src/pages/<X>.tsx, src/components/<Y>.tsx).
        - Per cycle: read the smallest set of files needed to fix THIS one test.
        - Re-use file content from previous Reads in this session (it's cached).

      ## TEST DISCOVERY — run only what test-first added
      Find new tests on this branch (do this ONCE at start):
        NEW_TESTS=$(git ls-files --others --exclude-standard tests/e2e | grep '\.spec\.ts$' | tr '\n' ' ')
      If empty, fall back to: $(git diff --name-only --diff-filter=A origin/main...HEAD -- 'tests/e2e/*.spec.ts')
      ALL playwright commands MUST pass these explicit paths, NOT --grep.

      ## CYCLE LOOP (max 10, not 25 — fail-fast for cost control)
      Per cycle:
        1. `bun x playwright test --project=iphone-15 --workers=4 $NEW_TESTS --reporter=line`
        2. If 0 failures on iphone-15: cross-browser sweep (step 5).
        3. Pick the FIRST failing test only. Read the test file (if not already read).
        4. Read the source files the test imports/selects (if not already read).
        5. Write the smallest change that passes that test. Run tests again.
        6. Loop back to step 1.
      Cross-browser sweep (only when iphone-15 is fully green):
        7. `bun x playwright test --workers=4 --project=iphone-15 --project=desktop-chrome --project=desktop-safari $NEW_TESTS --reporter=line`
        8. If green on all 3 → done. If not → treat as cycle failures, fix and re-sweep.
      Stop conditions: 10 cycles OR all 3 projects green OR you cannot make progress.

      ## CONSTRAINTS
        - Do NOT change test files (they are the spec, not the implementation)
        - Do NOT touch unrelated code
        - Do NOT add features not in the plan
        - Do NOT update visual snapshots silently — if a `*-snapshots/` PNG
          baseline doesn't match, defer to human via gate-pr (don't `--update-snapshots`)
        - Be terse: ≤ 30 words of reasoning per cycle
        - At cycle 10, stop and report — even if some tests still red

      Output JSON: { "cycles_used": int, "files_changed": [paths], "iphone_15_green": bool, "all_browsers_green": bool, "tests_red": [test_name] }
    output_format:
      type: object
      properties:
        cycles_used:        { type: integer }
        files_changed:      { type: array, items: { type: string } }
        iphone_15_green:    { type: boolean }
        all_browsers_green: { type: boolean }
        tests_red:          { type: array, items: { type: string } }
      required: [cycles_used, files_changed, iphone_15_green, all_browsers_green, tests_red]

  # ──────────────────────────────────────────────────────────────
  # PHASE 9 — VALIDATE (full suite + lint + tsc)
  # ──────────────────────────────────────────────────────────────

  - id: validate
    depends_on: [implement]
    bash: |
      # Pandomagic validate — the safety net.
      #
      # Validates:
      #   1. Smoke suite (always)
      #   2. Classifier's regression_must_pass list (level-aware)
      #   3. New feature tests (added on this branch)
      #   4. Lint only files changed on this branch
      #
      # Pre-existing lint errors in unrelated files are NOT this feature's
      # problem. Vercel build is the type-check authority (per PRD §11).
      set +e
      LEVEL="$classify.output.level"
      bun install --frozen-lockfile || bun install

      # 1. Lint changed files only
      CHANGED_FILES=$(git diff --name-only origin/main...HEAD -- '*.ts' '*.tsx' '*.js' '*.jsx' 2>/dev/null | tr '\n' ' ')
      if [[ -n "$CHANGED_FILES" ]]; then
        echo "lint: $CHANGED_FILES"
        bun x eslint $CHANGED_FILES || echo "(lint warnings — non-blocking)"
      fi

      # 2. Smoke suite — ALWAYS runs (every level)
      if ls tests/smoke/*.spec.ts >/dev/null 2>&1; then
        echo "smoke: tests/smoke/"
        bun x playwright test tests/smoke/ --workers=4 --reporter=line || { echo "✗ smoke failed" >&2; exit 1; }
      fi

      # 3. Regression must-pass — from classifier (level-aware)
      # The classifier's regression_must_pass JSON array is interpolated
      # by the harness. Each entry is a path or directory.
      REGRESSION_LIST="$classify.output.regression_must_pass"
      if [[ -n "$REGRESSION_LIST" && "$REGRESSION_LIST" != "[]" && "$REGRESSION_LIST" != "null" ]]; then
        REGRESSION_PATHS=$(echo "$REGRESSION_LIST" | python3 -c 'import sys,json; print(" ".join(json.load(sys.stdin)))' 2>/dev/null || echo "")
        if [[ -n "$REGRESSION_PATHS" ]]; then
          echo "regression: $REGRESSION_PATHS"
          # Filter to existing paths (some contract tests may not exist yet for nascent contracts)
          EXISTING_REG=""
          for path in $REGRESSION_PATHS; do
            [[ -e "$path" ]] && EXISTING_REG="$EXISTING_REG $path"
          done
          if [[ -n "$EXISTING_REG" ]]; then
            bun x playwright test $EXISTING_REG --workers=4 --reporter=line || {
              echo "✗ regression FAILED — change broke an architectural contract" >&2
              echo "  level=$LEVEL paths=$EXISTING_REG" >&2
              exit 2
            }
          fi
        fi
      fi

      # 4. New feature tests — added on this branch.
      # Rail #5: git pathspec does NOT expand `**` by default. Use plain
      # directory pathspecs and grep-filter to .spec.ts. Attempt 7 hit
      # this — the buggy glob returned empty even with 5 specs on disk.
      NEW_TESTS=$(git ls-files --others --exclude-standard tests/e2e tests/features 2>/dev/null | grep '\.spec\.ts$' | tr '\n' ' ')
      if [[ -z "$NEW_TESTS" ]]; then
        NEW_TESTS=$(git diff --name-only --diff-filter=A origin/main...HEAD -- tests/ 2>/dev/null | grep '\.spec\.ts$' | tr '\n' ' ')
      fi
      if [[ -n "$NEW_TESTS" ]]; then
        echo "feature: $NEW_TESTS"
        bun x playwright test $NEW_TESTS --workers=4 --reporter=line || { echo "✗ feature tests failed" >&2; exit 3; }
      else
        # L1 cosmetic features may legitimately add no tests (snapshot updates, copy fixes)
        if [[ "$LEVEL" != "L1" ]]; then
          echo "✗ no new tests found at L${LEVEL#L} — test-first failed silently" >&2
          exit 4
        fi
      fi

      echo "validate passed: smoke + regression(${EXISTING_REG:-none}) + feature($NEW_TESTS) all green"
      exit 0

  # ──────────────────────────────────────────────────────────────
  # PHASE 10 — FINAL REVIEW (single agent against original plan)
  # ──────────────────────────────────────────────────────────────

  - id: final-review
    depends_on: [validate]
    provider: deepseek
    context: fresh
    model: deepseek-v4-pro
    prompt: |
      Final review of the implementation against the plan.

      Plan: 20-architecture/$prd-extend.output.slug.md
      Architect concerns from earlier: $architect-review.output
      Security concerns from earlier: $security-review.output
      Files changed: $implement.output

      Verify EVERY concern raised earlier was addressed (or explicitly
      deferred to a follow-up Plane ticket — call those out).

      Output: ready-to-merge | needs-changes | follow-up-tickets-needed
      plus a 1-paragraph PR description.
    output_format:
      type: object
      properties:
        verdict:
          type: string
          enum: [ready-to-merge, needs-changes, follow-up-tickets-needed]
        pr_description: { type: string }
        follow_ups:
          type: array
          items: { type: string }
      required: [verdict, pr_description]

  # ──────────────────────────────────────────────────────────────
  # PHASE 11 — HUMAN GATE → OPEN PR
  # ──────────────────────────────────────────────────────────────

  - id: gate-pr
    depends_on: [final-review]
    timeout: 86400000
    bash: |
      set +e
      VERDICT="$final-review.output.verdict"
      if [[ "$VERDICT" == "needs-changes" ]]; then
        echo "✗ final-review says needs-changes. Halting before PR." >&2
        exit 1
      fi
      bash .archon/scripts/wait-for-approval.sh pr \
        "Final review verdict: $VERDICT. Test suite green. Approve to open PR."

  # Rail #6 — open-pr is now a deterministic bash node.
  # Was AI (DeepSeek-Flash) which hallucinated fake pr_url under output_format.
  # Now: branch, commit, push, gh pr create. No AI in the path = no hallucination.
  #
  # Notes:
  #  - set +e (NOT -e). `git diff --cached --quiet` exits 1 when diff exists,
  #    which kills `set -e` scripts. Manual exit checks below.
  #  - Harness wraps long-field interpolations in literal single quotes
  #    (Bug 24). Strip with ${VAR//\'/}. Also strip § from PRD section.
  - id: open-pr
    depends_on: [gate-pr]
    bash: |
      set +e
      SLUG_RAW="$prd-extend.output.slug"
      SECTION_RAW="$prd-extend.output.prd_section"
      SLUG="${SLUG_RAW//\'/}"
      SECTION="${SECTION_RAW//\'/}"
      SECTION="${SECTION#§}"
      if [[ -z "$SLUG" ]]; then
        echo "✗ no slug from prd-extend" >&2
        exit 6
      fi
      BRANCH="archon/${SLUG}"

      git checkout -b "$BRANCH" 2>/dev/null || git checkout "$BRANCH"
      [[ $? -ne 0 ]] && { echo "✗ branch checkout failed" >&2; exit 7; }
      git add -A
      if git diff --cached --quiet; then
        echo "✗ no staged changes — implement produced no diff" >&2
        exit 8
      fi

      TITLE_RAW=$(head -1 "docs/architecture/${SLUG}.md" 2>/dev/null | sed 's/^#* *//' | head -c 70)
      [[ -z "$TITLE_RAW" ]] && TITLE_RAW="archon: ${SLUG}"

      COMMIT_MSG_FILE=$(mktemp)
      {
        echo "$TITLE_RAW"
        echo
        echo "PRD: §${SECTION}"
        echo "Plan: docs/architecture/${SLUG}.md"
        echo
        echo "Generated by Pandomagic harness — see workflow log on CT 111."
        echo
        echo "Co-Authored-By: Pandomagic Harness <archon@beyondpandora.com>"
      } > "$COMMIT_MSG_FILE"

      git commit -F "$COMMIT_MSG_FILE" || { echo "✗ git commit failed" >&2; exit 9; }
      git push -u origin "$BRANCH" || { echo "✗ git push failed" >&2; exit 10; }

      GH_OUT=$(gh pr create --base main --head "$BRANCH" \
        --title "$TITLE_RAW" --body-file "$COMMIT_MSG_FILE" 2>&1)
      PR_URL=$(echo "$GH_OUT" | grep -oE 'https://github.com/[^ ]+/pull/[0-9]+' | head -1)

      if [[ -z "$PR_URL" ]]; then
        echo "✗ gh pr create did not return a URL. Output was:" >&2
        echo "$GH_OUT" >&2
        exit 11
      fi
      echo "PR opened: $PR_URL"
      rm -f "$COMMIT_MSG_FILE"
      exit 0
