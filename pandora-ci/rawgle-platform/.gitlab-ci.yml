stages:
  - test
  - analyze
  - ai-fix
  - validate
  - deploy

variables:
  JENKINS_URL: "http://pandora-jenkins:3001"
  OLLAMA_URL: "http://pandora-ollama:11434"
  SELENIUM_HUB: "http://pandora-selenium-hub:4444"
  SONARQUBE_URL: "http://pandora-sonarqube:3004"
  OPENPROJECT_URL: "http://pandora-openproject:3002"

# Scheduled test runs every 30 minutes
scheduled_tests:
  stage: test
  only:
    - schedules
  script:
    - npm install
    - npm test --json > test-results.json
    - |
      if [ $? -ne 0 ]; then
        echo "Tests failed, triggering AI fix pipeline..."
        curl -X POST $JENKINS_URL/job/ai-fix-pipeline/build \
          --data-urlencode json='{"parameter": [{"name":"TEST_RESULTS", "value":"'$(cat test-results.json | base64 -w0)'"}]}'
      fi
  artifacts:
    reports:
      junit: test-results.xml
    paths:
      - test-results.json
    expire_in: 1 week

# Unit tests
unit_tests:
  stage: test
  script:
    - npm install
    - npm run test:unit -- --coverage
  coverage: '/Lines\s*:\s*(\d+\.\d+)%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml

# Integration tests
integration_tests:
  stage: test
  services:
    - postgres:14
    - redis:7
  variables:
    POSTGRES_DB: rawgle_test
    POSTGRES_USER: rawgle
    POSTGRES_PASSWORD: testpass
    REDIS_URL: redis://redis:6379
  script:
    - npm install
    - npm run test:integration

# E2E Browser tests with Selenium
e2e_tests:
  stage: test
  script:
    - npm install
    - npm run test:e2e
  variables:
    SELENIUM_REMOTE_URL: $SELENIUM_HUB/wd/hub
  artifacts:
    when: always
    paths:
      - screenshots/
      - test-reports/
    expire_in: 1 week

# Code quality analysis
sonarqube_check:
  stage: analyze
  script:
    - sonar-scanner \
      -Dsonar.projectKey=rawgle \
      -Dsonar.sources=src \
      -Dsonar.host.url=$SONARQUBE_URL \
      -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
  only:
    - merge_requests
    - main

# AI Fix stage (triggered by webhook from Jenkins)
apply_ai_fix:
  stage: ai-fix
  when: manual
  only:
    - branches
  script:
    - echo "AI fix has been generated by Jenkins"
    - git fetch origin ai-fix/$CI_COMMIT_SHORT_SHA
    - git checkout ai-fix/$CI_COMMIT_SHORT_SHA
    - npm install
    - npm test
    - |
      if [ $? -eq 0 ]; then
        echo "AI fix successful, creating merge request..."
        git push origin HEAD:ai-fix/$CI_COMMIT_SHORT_SHA
      fi

# Validation after AI fix
validate_fix:
  stage: validate
  needs: ["apply_ai_fix"]
  script:
    - npm install
    - npm test
    - npm run lint
    - npm run type-check
  only:
    - branches

# Deploy to Cloudflare Pages/Workers
deploy_production:
  stage: deploy
  only:
    - main
  script:
    - npm run build
    - npx wrangler pages deploy ./dist --project-name=rawgle
  environment:
    name: production
    url: https://rawgle.com

# Deploy preview for branches
deploy_preview:
  stage: deploy
  only:
    - branches
  except:
    - main
  script:
    - npm run build
    - npx wrangler pages deploy ./dist --project-name=rawgle --branch=$CI_COMMIT_REF_NAME
  environment:
    name: review/$CI_COMMIT_REF_NAME
    url: https://$CI_COMMIT_REF_SLUG.rawgle.pages.dev
    on_stop: stop_preview

stop_preview:
  stage: deploy
  script:
    - echo "Cleaning up preview environment"
  when: manual
  environment:
    name: review/$CI_COMMIT_REF_NAME
    action: stop