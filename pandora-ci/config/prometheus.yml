global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first.rules"
  # - "second.rules"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']

  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']

  # Application monitoring
  - job_name: 'gitlab'
    static_configs:
      - targets: ['gitlab:80']
    metrics_path: '/-/metrics'

  - job_name: 'openproject'
    static_configs:
      - targets: ['openproject:80']

  - job_name: 'jenkins'
    static_configs:
      - targets: ['jenkins:8080']
    metrics_path: '/prometheus/'

  - job_name: 'sonarqube'
    static_configs:
      - targets: ['sonarqube:9000']