name: Knome
options:
  bundleIdPrefix: com.knome
  deploymentTarget:
    iOS: 16.0
  
settings:
  DEVELOPMENT_TEAM: DEMO123456
  SWIFT_VERSION: 5.9
  IPHONEOS_DEPLOYMENT_TARGET: 16.0
  
targets:
  Knome:
    type: application
    platform: iOS
    
    sources:
      - Sources
      
    info:
      path: Info.plist
      
    entitlements:
      path: Knome.entitlements
      
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.knome.app
      MARKETING_VERSION: 1.0.0
      CURRENT_PROJECT_VERSION: 1
      
    dependencies:
      - package: OpenAI
        
    scheme: {}
      
packages:
  OpenAI:
    url: https://github.com/MacPaw/OpenAI
    from: 0.2.4
