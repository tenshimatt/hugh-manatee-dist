name = "rawgle-com"
main = "src/rawgle-worker.js"
compatibility_date = "2024-03-08"
compatibility_flags = ["nodejs_compat"]

# Production environment for RAWGLE.COM
[env.production]
name = "rawgle-com-production"
routes = [
  { pattern = "rawgle.com/*", zone_name = "rawgle.com" },
  { pattern = "www.rawgle.com/*", zone_name = "rawgle.com" }
]

[[env.production.d1_databases]]
binding = "DB"
database_name = "findrawdogfood-db"
database_id = "9dcf8539-f274-486c-807b-7e265146ce6b"

# KV namespace for sessions
[[env.production.kv_namespaces]]
binding = "RAWGLE_SESSIONS"
id = "2f26e521c3124418b5d3f1fc8dec7819"

# KV namespace for scraper state
[[env.production.kv_namespaces]]
binding = "SCRAPER_KV"
id = "3d00d367578d4bef958a8e1bb42fa155"

# Development environment
[env.development]
name = "rawgle-com-dev"

[[env.development.d1_databases]]
binding = "DB"
database_name = "findrawdogfood-db-dev"
database_id = "9dcf8539-f274-486c-807b-7e265146ce6b"

# Environment variables (add your API keys here if needed)
[env.production.vars]
ENVIRONMENT = "production"
PRIMARY_DOMAIN = "rawgle.com"
LEGACY_DOMAIN = "findrawdogfood.com"
ALLOWED_IPS = "31.186.113.200"
ADMIN_USERNAME = "admin"
ADMIN_PASSWORD = "rawgle2025!"

[env.development.vars]
ENVIRONMENT = "development"
PRIMARY_DOMAIN = "rawgle.com"
LEGACY_DOMAIN = "findrawdogfood.com"
