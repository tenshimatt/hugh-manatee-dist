name = "superluxe-engagement-bot"
main = "src/engagement-orchestrator.js"
compatibility_date = "2024-03-08"

# SUPERLUXE Community Engagement Bot
# Monitors Reddit art communities and generates intelligent brand responses

[env.production]
name = "superluxe-engagement-bot-prod"

# Scheduled triggers for autonomous operation
[env.production.triggers]
crons = ["*/15 * * * *", "0 */2 * * *", "0 0 * * *"]

# Database binding (reuse existing D1 database)
[[env.production.d1_databases]]
binding = "DB"
database_name = "findrawdogfood-db"
database_id = "9dcf8539-f274-486c-807b-7e265146ce6b"

# Environment variables for API keys and configuration
[env.production.vars]
ENVIRONMENT = "production"
BOT_NAME = "SUPERLUXE Community Bot"
MAX_DAILY_ENGAGEMENTS = "12"
MIN_TIME_BETWEEN_POSTS = "1800000" # 30 minutes in milliseconds
QUALITY_THRESHOLD = "0.7"
RISK_THRESHOLD = "0.3"

# Secrets (set via: wrangler secret put REDDIT_CLIENT_ID)
# REDDIT_CLIENT_ID = "your_reddit_client_id"
# REDDIT_CLIENT_SECRET = "your_reddit_client_secret" 
# OPENAI_API_KEY = "your_openai_api_key"

# Development environment
[env.dev]
name = "superluxe-engagement-bot-dev"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "findrawdogfood-db"
database_id = "9dcf8539-f274-486c-807b-7e265146ce6b"

[env.dev.vars]
ENVIRONMENT = "development"
BOT_NAME = "SUPERLUXE Community Bot (Dev)"
MAX_DAILY_ENGAGEMENTS = "3"
MIN_TIME_BETWEEN_POSTS = "300000" # 5 minutes for testing
QUALITY_THRESHOLD = "0.5"
RISK_THRESHOLD = "0.5"