# Rawgle Backend - Production Configuration
name = "rawgle-backend-prod"
main = "src/index.js"
compatibility_date = "2023-12-01"
compatibility_flags = ["nodejs_compat"]

# Production D1 Database
[[d1_databases]]
binding = "DB"
database_name = "rawgle-db-prod"
database_id = "REPLACE_WITH_ACTUAL_DB_ID" # Will be updated during deployment

# Production Routes
[[routes]]
pattern = "api.rawgle.com/*"
zone_name = "rawgle.com"

# Environment Variables for Production
[vars]
ENVIRONMENT = "production"
API_VERSION = "v1"
LOG_LEVEL = "info"
RATE_LIMIT_WINDOW = "60"
RATE_LIMIT_MAX_REQUESTS = "100"
PAWS_EARNING_RATES = '{"order_completion": 10, "review_submission": 5, "referral": 25}'
ALLOWED_ORIGINS = '["https://rawgle.com", "https://www.rawgle.com", "https://rawgle-frontend.pages.dev"]'
JWT_EXPIRY = "24h"
BCRYPT_ROUNDS = "12"
MAX_FILE_SIZE = "5242880"
PAGINATION_DEFAULT_LIMIT = "20"
PAGINATION_MAX_LIMIT = "100"

# Security Configuration
[vars.SECURITY]
ENABLE_RATE_LIMITING = "true"
ENABLE_CORS = "true"
ENABLE_HELMET = "true"
SECURE_COOKIES = "true"
ENABLE_AUDIT_LOGGING = "true"

# Feature Flags
[vars.FEATURES]
ENABLE_USER_REGISTRATION = "true"
ENABLE_PAWS_SYSTEM = "true"
ENABLE_REVIEWS = "true"
ENABLE_ORDERS = "true"
ENABLE_NOTIFICATIONS = "true"
ENABLE_ANALYTICS = "true"
MAINTENANCE_MODE = "false"

# Monitoring Configuration
[vars.MONITORING]
ENABLE_HEALTH_CHECKS = "true"
ENABLE_METRICS = "true"
HEALTH_CHECK_INTERVAL = "30"
METRICS_RETENTION_DAYS = "7"

# Database Configuration
[vars.DATABASE]
QUERY_TIMEOUT = "30000"
CONNECTION_TIMEOUT = "10000"
MAX_RETRIES = "3"
ENABLE_QUERY_LOGGING = "false"

# Cache Configuration
[vars.CACHE]
DEFAULT_TTL = "300"
USER_CACHE_TTL = "900"
SUPPLIER_CACHE_TTL = "1800"
REVIEW_CACHE_TTL = "600"

# Production optimizations
[build]
command = "npm run build"

[build.upload]
format = "service-worker"

# Durable Objects (for analytics and session management)
[[durable_objects.bindings]]
name = "ANALYTICS"
class_name = "Analytics"
script_name = "rawgle-analytics"

[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

# KV Namespaces for caching
[[kv_namespaces]]
binding = "CACHE"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_ID"

[[kv_namespaces]]
binding = "SESSIONS"
id = "REPLACE_WITH_SESSIONS_KV_ID"
preview_id = "REPLACE_WITH_SESSIONS_KV_PREVIEW_ID"

# R2 Bucket for file uploads
[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "rawgle-uploads-prod"

# Queue for background processing
[[queues.producers]]
queue = "rawgle-notifications"
binding = "NOTIFICATION_QUEUE"

[[queues.consumers]]
queue = "rawgle-notifications"
max_batch_size = 10
max_batch_timeout = 30

# Analytics and monitoring
[[analytics_engine_datasets]]
binding = "ANALYTICS"

# Cron triggers for maintenance tasks
[[triggers.crons]]
cron = "0 0 * * *"  # Daily at midnight
function = "cleanup"

[[triggers.crons]]
cron = "*/30 * * * *"  # Every 30 minutes
function = "healthCheck"

[[triggers.crons]]
cron = "0 */6 * * *"  # Every 6 hours
function = "analytics"

# Environment-specific limits
[limits]
cpu_ms = 30000
memory_mb = 256

# Observability
[observability]
enabled = true
head_sampling_rate = 0.01