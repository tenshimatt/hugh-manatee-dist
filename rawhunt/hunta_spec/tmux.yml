session_name: hunta-dev
start_directory: ./  # root of repo

windows:
  - window_name: frontend
    panes:
      - shell_command:
          - cd frontend
          - npm run dev
  - window_name: backend
    panes:
      - shell_command:
          - cd backend
          - wrangler dev
  - window_name: tests
    panes:
      - shell_command:
          - cd tests
          - cucumber-js features
  - window_name: notion
    panes:
      - shell_command:
          - python3 tools/notion_push.py
  - window_name: logs
    panes:
      - shell_command:
          - tail -f logs/universal.log
