name = "rawgle-backend"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "rawgle-production-db"
database_id = "9dcf8539-f274-486c-807b-7e265146ce6b"

# KV Storage for Claude AI caching
[[kv_namespaces]]
binding = "CACHE"
preview_id = "a1a27b8970ce453db1e997e9341eaa2a"
id = "c53c6240247746f48374f5fc20af1f0c"

# Production environment
[env.production]
name = "rawgle-backend-prod"

[[env.production.d1_databases]]
binding = "DB"
database_name = "rawgle-production-db"
database_id = "9dcf8539-f274-486c-807b-7e265146ce6b"

[[env.production.kv_namespaces]]
binding = "CACHE"
id = "c53c6240247746f48374f5fc20af1f0c"

[env.production.vars]
# JWT_SECRET should be set via: wrangler secret put JWT_SECRET --env production
ENVIRONMENT = "production"
BYPASS_AUTH = "true"
BCRYPT_ROUNDS = "14"
RATE_LIMIT_WINDOW = "60"
RATE_LIMIT_MAX_REQUESTS = "50"
PAWS_EARNING_RATES = '{"order_completion": 10, "review_submission": 5, "referral": 25}'
API_VERSION = "v1"
# Claude AI Configuration - Set via Cloudflare Dashboard as secret
# ANTHROPIC_API_KEY will be set via wrangler secret put ANTHROPIC_API_KEY

# Staging environment
[env.staging]
name = "rawgle-backend-staging"

[env.staging.vars]
# JWT_SECRET should be set via: wrangler secret put JWT_SECRET --env staging
ENVIRONMENT = "staging"
BYPASS_AUTH = "true"
BCRYPT_ROUNDS = "12"
RATE_LIMIT_WINDOW = "60"
RATE_LIMIT_MAX_REQUESTS = "100"
PAWS_EARNING_RATES = '{"order_completion": 10, "review_submission": 5, "referral": 25}'
API_VERSION = "v1"
# Claude AI Configuration - Add your ANTHROPIC_API_KEY for staging
# ANTHROPIC_API_KEY = "sk-ant-api03-your-staging-key-here"

# Development/default environment
[vars]
# JWT_SECRET should be set via: wrangler secret put JWT_SECRET
ENVIRONMENT = "development"
BYPASS_AUTH = "true"
BCRYPT_ROUNDS = "12"
RATE_LIMIT_WINDOW = "60"
RATE_LIMIT_MAX_REQUESTS = "100"
PAWS_EARNING_RATES = '{"order_completion": 10, "review_submission": 5, "referral": 25}'
API_VERSION = "v1"
# Claude AI Configuration - Add your ANTHROPIC_API_KEY here for development
# ANTHROPIC_API_KEY should be set via: wrangler secret put ANTHROPIC_API_KEY