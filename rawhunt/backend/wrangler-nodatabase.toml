name = "rawgle-backend-nodatabase"
main = "src/index-nodatabase.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Environment Variables (no database binding)
[vars]
JWT_SECRET = "mock-jwt-secret-for-testing"
BCRYPT_ROUNDS = "12"
RATE_LIMIT_WINDOW = "60"
RATE_LIMIT_MAX_REQUESTS = "100"
PAWS_EARNING_RATES = '{"order_completion": 10, "review_submission": 5, "referral": 25}'
API_VERSION = "v1"
ENVIRONMENT = "production"
