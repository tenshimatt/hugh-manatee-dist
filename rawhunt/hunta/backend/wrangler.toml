name = "hunta-backend"
main = "workers/index.js"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"
JWT_SECRET = "hunta-dev-secret-key-change-in-production"
UPLOAD_LIMIT = "10485760"  # 10MB

[[d1_databases]]
binding = "DB"
database_name = "hunta-db"
database_id = "placeholder-database-id"

[[kv_namespaces]]
binding = "CACHE"
id = "placeholder-kv-id"
preview_id = "placeholder-kv-preview-id"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "hunta-media"
preview_bucket_name = "hunta-media-preview"

[env.production]
name = "hunta-backend-prod"
vars = { ENVIRONMENT = "production" }

[[env.production.d1_databases]]
binding = "DB"
database_name = "hunta-db-prod"
database_id = "placeholder-prod-database-id"

[[env.production.kv_namespaces]]
binding = "CACHE"
id = "placeholder-prod-kv-id"

[[env.production.r2_buckets]]
binding = "MEDIA"
bucket_name = "hunta-media-prod"