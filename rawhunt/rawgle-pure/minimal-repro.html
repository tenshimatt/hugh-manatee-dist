<!DOCTYPE html>
<html>
<head>
    <title>Minimal Repro - Failed to Fetch</title>
    <style>
        body { 
            font-family: 'SF Mono', Monaco, monospace; 
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); 
            color: white; 
            padding: 30px; 
            margin: 0;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .card { 
            background: rgba(255,255,255,0.1); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 12px; 
            padding: 25px; 
            margin: 20px 0; 
        }
        h1 { text-align: center; margin-bottom: 30px; font-size: 2em; }
        .test-btn { 
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4); 
            color: white; 
            border: none; 
            padding: 15px 30px; 
            border-radius: 25px; 
            cursor: pointer; 
            font-weight: bold; 
            margin: 10px; 
            font-size: 16px;
            transition: transform 0.2s;
        }
        .test-btn:hover { transform: translateY(-2px); }
        .log { 
            background: rgba(0,0,0,0.3); 
            padding: 15px; 
            border-radius: 8px; 
            margin: 15px 0; 
            min-height: 100px;
            font-family: 'SF Mono', monospace;
            font-size: 14px;
            white-space: pre-wrap;
            overflow-wrap: break-word;
        }
        .success { color: #4CAF50; }
        .error { color: #FF6B6B; }
        .warning { color: #FFC107; }
        .info { color: #54A3FF; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Minimal Reproduction Test</h1>
        
        <div class="card">
            <h2>🎯 Purpose</h2>
            <p>This is a minimal test to reproduce the exact "Failed to fetch" error you're experiencing.</p>
            <p><strong>Expected:</strong> One test should succeed, helping us identify the root cause.</p>
        </div>
        
        <div class="card">
            <h2>🧪 Tests</h2>
            <button class="test-btn" onclick="testExactDashboardCall()">🎯 Exact Dashboard Call</button>
            <button class="test-btn" onclick="testSimpleHealthCheck()">❤️ Simple Health Check</button>
            <button class="test-btn" onclick="testCORSPreflight()">✈️ CORS Preflight</button>
            <button class="test-btn" onclick="testWithoutHeaders()">📄 No Custom Headers</button>
            <button class="test-btn" onclick="clearLog()">🗑️ Clear Log</button>
        </div>
        
        <div class="card">
            <div class="log" id="log"></div>
        </div>
        
        <div class="card">
            <h2>📊 Current Status</h2>
            <div id="status">Ready to test...</div>
        </div>
    </div>
    
    <script>
        const API_BASE = 'https://rawgle-api.findrawdogfood.workers.dev';
        const ADMIN_TOKEN = 'rawgle-admin-2025';
        
        function log(message, type = 'info') {
            const logEl = document.getElementById('log');
            const timestamp = new Date().toISOString().substring(11, 19);
            const colorClass = type;
            
            logEl.innerHTML += `<span class="${colorClass}">[${timestamp}] ${message}</span>\n`;
            logEl.scrollTop = logEl.scrollHeight;
            
            console.log(`[${type.toUpperCase()}] ${message}`);
        }
        
        function updateStatus(message) {
            document.getElementById('status').textContent = message;
        }
        
        function clearLog() {
            document.getElementById('log').innerHTML = '';
            updateStatus('Log cleared, ready for new tests...');
        }
        
        async function testExactDashboardCall() {
            log('🎯 Testing exact dashboard call that should work...', 'info');
            updateStatus('Testing dashboard endpoint...');
            
            const url = `${API_BASE}/api/test-management/dashboard?minimal-repro=${Date.now()}`;
            
            try {
                log(`Making request to: ${url}`, 'info');
                log(`With headers: X-Admin-Token: ${ADMIN_TOKEN}`, 'info');
                
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Admin-Token': ADMIN_TOKEN
                    },
                    mode: 'cors',
                    cache: 'no-store'
                });
                
                log(`✅ Response received: ${response.status} ${response.statusText}`, 'success');
                
                if (response.ok) {
                    const data = await response.json();
                    log('🎉 SUCCESS! Dashboard API is working perfectly!', 'success');
                    log(`Data received: ${JSON.stringify(data, null, 2)}`, 'success');
                    updateStatus('✅ Dashboard works! The issue is resolved!');
                } else {
                    log(`❌ HTTP Error: ${response.status} - ${response.statusText}`, 'error');
                    const errorText = await response.text();
                    log(`Error details: ${errorText}`, 'error');
                    updateStatus(`❌ HTTP ${response.status} error`);
                }
                
            } catch (error) {
                log(`❌ FETCH FAILED: ${error.name} - ${error.message}`, 'error');
                
                if (error.message.includes('Failed to fetch')) {
                    log('🚨 CONFIRMED: This is the "Failed to fetch" error!', 'error');
                    log('This indicates a network-level issue, not an application issue.', 'warning');
                    log('Possible causes:', 'info');
                    log('• Browser security policy (like Brave shields)', 'info');
                    log('• Corporate firewall blocking the request', 'info');
                    log('• DNS resolution issues', 'info');
                    log('• SSL/TLS certificate problems', 'info');
                    log('• Network connectivity issues', 'info');
                    updateStatus('❌ "Failed to fetch" error confirmed');
                }
                
                // Show the full error object
                log(`Full error object:`, 'info');
                log(`  name: ${error.name}`, 'info');
                log(`  message: ${error.message}`, 'info');
                if (error.stack) {
                    log(`  stack: ${error.stack.substring(0, 200)}...`, 'info');
                }
            }
        }
        
        async function testSimpleHealthCheck() {
            log('❤️ Testing simple health check (no authentication)...', 'info');
            updateStatus('Testing health endpoint...');
            
            const url = `${API_BASE}/api/health?simple-test=${Date.now()}`;
            
            try {
                log(`Making simple request to: ${url}`, 'info');
                
                const response = await fetch(url, {
                    cache: 'no-store'
                });
                
                if (response.ok) {
                    const data = await response.json();
                    log('✅ Health check successful!', 'success');
                    log(`Health data: ${JSON.stringify(data)}`, 'success');
                    updateStatus('✅ Health check passed');
                } else {
                    log(`❌ Health check failed: ${response.status}`, 'error');
                    updateStatus(`❌ Health check failed: ${response.status}`);
                }
                
            } catch (error) {
                log(`❌ Health check error: ${error.message}`, 'error');
                updateStatus(`❌ Health check error: ${error.message}`);
            }
        }
        
        async function testCORSPreflight() {
            log('✈️ Testing CORS preflight request...', 'info');
            updateStatus('Testing CORS preflight...');
            
            const url = `${API_BASE}/api/test-management/dashboard`;
            
            try {
                log(`Sending OPTIONS request to: ${url}`, 'info');
                
                const response = await fetch(url, {
                    method: 'OPTIONS',
                    headers: {
                        'Origin': window.location.origin,
                        'Access-Control-Request-Method': 'GET',
                        'Access-Control-Request-Headers': 'X-Admin-Token, Content-Type'
                    }
                });
                
                log(`✅ CORS preflight response: ${response.status}`, 'success');
                
                // Check CORS headers
                const corsHeaders = {};
                response.headers.forEach((value, key) => {
                    if (key.startsWith('access-control')) {
                        corsHeaders[key] = value;
                    }
                });
                
                log(`CORS headers received:`, 'info');
                for (const [key, value] of Object.entries(corsHeaders)) {
                    log(`  ${key}: ${value}`, 'info');
                }
                
                const hasAdminToken = corsHeaders['access-control-allow-headers']?.includes('X-Admin-Token');
                if (hasAdminToken) {
                    log('✅ X-Admin-Token is allowed in CORS headers', 'success');
                } else {
                    log('⚠️ X-Admin-Token may not be allowed', 'warning');
                }
                
                updateStatus('✅ CORS preflight completed');
                
            } catch (error) {
                log(`❌ CORS preflight failed: ${error.message}`, 'error');
                updateStatus(`❌ CORS preflight failed`);
            }
        }
        
        async function testWithoutHeaders() {
            log('📄 Testing request without custom headers...', 'info');
            updateStatus('Testing without custom headers...');
            
            const url = `${API_BASE}/api/health?no-headers=${Date.now()}`;
            
            try {
                log(`Making request without custom headers to: ${url}`, 'info');
                
                const response = await fetch(url, {
                    method: 'GET',
                    cache: 'no-store'
                });
                
                if (response.ok) {
                    log('✅ Request without custom headers succeeded!', 'success');
                    updateStatus('✅ Simple request works');
                    
                    // Now try adding just Content-Type
                    log('Trying with just Content-Type header...', 'info');
                    const response2 = await fetch(url.replace('no-headers', 'content-type'), {
                        method: 'GET',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        cache: 'no-store'
                    });
                    
                    if (response2.ok) {
                        log('✅ Content-Type header works', 'success');
                    } else {
                        log('⚠️ Content-Type header may cause issues', 'warning');
                    }
                    
                    // Now try adding the X-Admin-Token
                    log('Trying with X-Admin-Token header...', 'info');
                    const response3 = await fetch(url.replace('no-headers', 'admin-token'), {
                        method: 'GET',
                        headers: {
                            'X-Admin-Token': ADMIN_TOKEN
                        },
                        cache: 'no-store'
                    });
                    
                    if (response3.ok) {
                        log('✅ X-Admin-Token header works', 'success');
                    } else {
                        log('❌ X-Admin-Token header causes failure', 'error');
                    }
                    
                } else {
                    log(`❌ Even simple request failed: ${response.status}`, 'error');
                    updateStatus(`❌ Simple request failed: ${response.status}`);
                }
                
            } catch (error) {
                log(`❌ Simple request error: ${error.message}`, 'error');
                updateStatus(`❌ Simple request error: ${error.message}`);
            }
        }
        
        // Show initial environment info
        setTimeout(() => {
            log('🔍 Minimal Reproduction Test Started', 'info');
            log(`Browser: ${navigator.userAgent.split(' ')[navigator.userAgent.split(' ').length - 1]}`, 'info');
            log(`Location: ${window.location.href}`, 'info');
            log(`API Target: ${API_BASE}`, 'info');
            log('', 'info');
            log('Click any test button above to start debugging...', 'info');
            
            // Check for Brave browser specifically
            if (window.navigator.brave || navigator.userAgent.includes('Brave')) {
                log('🛡️ BRAVE BROWSER DETECTED!', 'warning');
                log('Brave shields may be blocking the requests.', 'warning');
                log('Try disabling shields for localhost in the address bar.', 'info');
            }
            
        }, 500);
    </script>
</body>
</html>
