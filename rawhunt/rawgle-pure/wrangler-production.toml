name = "rawgle-api"
main = "src/index.js"
compatibility_date = "2024-08-12"
compatibility_flags = ["nodejs_compat"]

# KV Namespaces
[[kv_namespaces]]
binding = "RAWGLE_KV"
id = "76d631ee10d149e295a6ab076c40d0b6"

[[kv_namespaces]]
binding = "SESSIONS"
id = "fa2f4fbd6cec49518d005769c8c3d0e3"

# Environment Variables from .env
[vars]
ENVIRONMENT = "production"
PRIMARY_DOMAIN = "rawgle.com"
SOLANA_MASTER_WALLET = "E9mnWdbp97pGaUTGRP743KhppWkYzkagWo7JM3hRJsHA"
PAWS_EXCHANGE_RATE = "1000"
MAX_DAILY_PAWS = "500"
LOG_LEVEL = "info"
RATE_LIMIT_PER_MINUTE = "60"
MAX_PAYLOAD_SIZE = "10485760"
SESSION_TIMEOUT_HOURS = "24"
ENABLE_NFT_MINTING = "true"
ENABLE_AI_CONSULTATIONS = "true"
ENABLE_MARKETPLACE = "false"
ENABLE_SUBSCRIPTION_FEATURES = "true"

# Production environment config
[env.production]
name = "rawgle-api-production"

[env.production.vars]
ENVIRONMENT = "production"

# Add routes when domain is ready
# [[env.production.routes]]
# pattern = "rawgle.com/*"
# zone_name = "rawgle.com"
# 
# [[env.production.routes]]
# pattern = "www.rawgle.com/*"
# zone_name = "rawgle.com"
