<!DOCTYPE html>
<html>
<head>
    <title>Direct Debug - Browser Console</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #000; color: #0f0; }
        .console { background: #111; padding: 15px; border: 1px solid #333; margin: 10px 0; }
        button { background: #333; color: #0f0; padding: 10px; border: 1px solid #666; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🔍 Direct Debug Tool</h1>
    <p><strong>IMPORTANT:</strong> Open browser DevTools (F12) and check Console tab</p>
    
    <button onclick="runDirectTests()">Run Direct Tests</button>
    <button onclick="testAlternativeAPI()">Test Alternative API</button>
    
    <div class="console">
        <h3>Instructions:</h3>
        <p>1. Open DevTools (F12)</p>
        <p>2. Go to Console tab</p>
        <p>3. Click "Run Direct Tests"</p>
        <p>4. Copy ALL console output</p>
        <p>5. Look for specific error messages</p>
    </div>
    
    <div id="output"></div>
    
    <script>
        const API_BASE = 'https://rawgle-api.findrawdogfood.workers.dev';
        const ADMIN_TOKEN = 'rawgle-admin-2025';
        
        function log(message, data = null) {
            console.log(`[DEBUG] ${message}`, data || '');
            const output = document.getElementById('output');
            output.innerHTML += `<div class="console">${message}${data ? '<br><pre>' + JSON.stringify(data, null, 2) + '</pre>' : ''}</div>`;
        }
        
        async function runDirectTests() {
            console.clear();
            log('🔍 STARTING DIRECT DEBUG SESSION');
            log('Time: ' + new Date().toISOString());
            log('User Agent: ' + navigator.userAgent);
            log('Location: ' + window.location.href);
            log('');
            
            // Test 1: Check if API domain is reachable
            log('TEST 1: Basic domain resolution');
            try {
                const response = await fetch(API_BASE + '/api/health');
                log('✅ Health check response:', {
                    status: response.status,
                    ok: response.ok,
                    url: response.url,
                    type: response.type,
                    redirected: response.redirected
                });
                
                const data = await response.json();
                log('Health data:', data);
            } catch (error) {
                log('❌ Health check failed:', {
                    name: error.name,
                    message: error.message,
                    stack: error.stack
                });
            }
            
            // Test 2: Test CORS preflight manually
            log('');
            log('TEST 2: Manual CORS preflight');
            try {
                const preflightResponse = await fetch(API_BASE + '/api/test-management/dashboard', {
                    method: 'OPTIONS',
                    headers: {
                        'Origin': window.location.origin,
                        'Access-Control-Request-Method': 'GET',
                        'Access-Control-Request-Headers': 'X-Admin-Token'
                    }
                });
                
                const corsHeaders = {};
                preflightResponse.headers.forEach((value, key) => {
                    if (key.startsWith('access-control')) {
                        corsHeaders[key] = value;
                    }
                });
                
                log('✅ CORS preflight response:', {
                    status: preflightResponse.status,
                    corsHeaders: corsHeaders
                });
            } catch (error) {
                log('❌ CORS preflight failed:', {
                    name: error.name,
                    message: error.message
                });
            }
            
            // Test 3: Try dashboard request with detailed error handling
            log('');
            log('TEST 3: Dashboard request with error details');
            try {
                log('Making dashboard request...');
                
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 30000);
                
                const response = await fetch(API_BASE + '/api/test-management/dashboard?debug=' + Date.now(), {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Admin-Token': ADMIN_TOKEN,
                        'User-Agent': navigator.userAgent
                    },
                    signal: controller.signal,
                    mode: 'cors',
                    cache: 'no-store'
                });
                
                clearTimeout(timeoutId);
                
                log('✅ Dashboard request completed:', {
                    status: response.status,
                    ok: response.ok,
                    statusText: response.statusText,
                    url: response.url,
                    type: response.type
                });
                
                if (response.ok) {
                    const data = await response.json();
                    log('🎉 DASHBOARD SUCCESS!', {
                        overview: data.overview,
                        timeframe: data.timeframe
                    });
                } else {
                    const errorText = await response.text();
                    log('❌ Dashboard HTTP error:', {
                        status: response.status,
                        statusText: response.statusText,
                        body: errorText
                    });
                }
                
            } catch (error) {
                log('❌ Dashboard request exception:', {
                    name: error.name,
                    message: error.message,
                    code: error.code,
                    stack: error.stack?.substring(0, 500)
                });
                
                // Additional error analysis
                if (error.name === 'AbortError') {
                    log('🕐 Request was aborted (timeout)');
                } else if (error.name === 'TypeError' && error.message.includes('Failed to fetch')) {
                    log('🚫 Network error - possible causes:', [
                        'Browser blocking request',
                        'Network connectivity issue',
                        'CORS policy violation',
                        'SSL/TLS certificate issue',
                        'DNS resolution failure',
                        'Firewall blocking request'
                    ]);
                }
            }
            
            // Test 4: Try with XMLHttpRequest
            log('');
            log('TEST 4: Alternative request with XMLHttpRequest');
            await testWithXHR();
            
            // Test 5: Check browser capabilities
            log('');
            log('TEST 5: Browser capabilities');
            log('Browser capabilities:', {
                fetch: typeof fetch,
                Promise: typeof Promise,
                XMLHttpRequest: typeof XMLHttpRequest,
                AbortController: typeof AbortController,
                Headers: typeof Headers,
                URL: typeof URL
            });
            
            log('');
            log('🔍 DEBUG SESSION COMPLETE');
            log('Check console for any additional error messages');
        }
        
        function testWithXHR() {
            return new Promise((resolve) => {
                const xhr = new XMLHttpRequest();
                
                xhr.onreadystatechange = function() {
                    log(`XHR State change: ${xhr.readyState}`, {
                        readyState: xhr.readyState,
                        status: xhr.status,
                        statusText: xhr.statusText
                    });
                    
                    if (xhr.readyState === 4) {
                        if (xhr.status === 200) {
                            log('✅ XMLHttpRequest SUCCESS:', {
                                status: xhr.status,
                                responseLength: xhr.responseText.length,
                                responsePreview: xhr.responseText.substring(0, 100)
                            });
                        } else {
                            log('❌ XMLHttpRequest failed:', {
                                status: xhr.status,
                                statusText: xhr.statusText,
                                response: xhr.responseText
                            });
                        }
                        resolve();
                    }
                };
                
                xhr.onerror = function() {
                    log('❌ XMLHttpRequest error event triggered');
                    resolve();
                };
                
                xhr.onabort = function() {
                    log('❌ XMLHttpRequest aborted');
                    resolve();
                };
                
                xhr.ontimeout = function() {
                    log('❌ XMLHttpRequest timeout');
                    resolve();
                };
                
                try {
                    xhr.open('GET', API_BASE + '/api/test-management/dashboard?xhr=' + Date.now(), true);
                    xhr.setRequestHeader('Content-Type', 'application/json');
                    xhr.setRequestHeader('X-Admin-Token', ADMIN_TOKEN);
                    xhr.timeout = 30000;
                    
                    log('Sending XMLHttpRequest...');
                    xhr.send();
                } catch (error) {
                    log('❌ XMLHttpRequest setup error:', error);
                    resolve();
                }
            });
        }
        
        async function testAlternativeAPI() {
            log('');
            log('TEST: Alternative API endpoints');
            
            // Try different endpoints
            const endpoints = [
                '/api/health',
                '/api/test-management',
                '/api/test-management/dashboard'
            ];
            
            for (const endpoint of endpoints) {
                try {
                    const response = await fetch(API_BASE + endpoint);
                    log(`✅ ${endpoint}:`, {
                        status: response.status,
                        ok: response.ok
                    });
                } catch (error) {
                    log(`❌ ${endpoint}:`, error.message);
                }
            }
        }
        
        // Show initial info
        log('🔍 Debug tool loaded');
        log('Ready to debug dashboard connection issues');
        log('Click "Run Direct Tests" and check console output');
    </script>
</body>
</html>
