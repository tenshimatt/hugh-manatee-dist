<!DOCTYPE html>
<html>
<head>
    <title>HTTP Fallback Test</title>
    <style>
        body { font-family: monospace; background: #2d2d2d; color: #fff; padding: 20px; }
        .test { background: #333; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .success { border-left: 4px solid #4CAF50; }
        .error { border-left: 4px solid #F44336; }
        .info { border-left: 4px solid #2196F3; }
        button { background: #555; color: white; border: none; padding: 10px 20px; border-radius: 3px; cursor: pointer; margin: 5px; }
        button:hover { background: #666; }
    </style>
</head>
<body>
    <h1>🔄 HTTP Fallback Test</h1>
    <p>This test checks if HTTPS/SSL is causing the connection issues by trying different protocols.</p>
    
    <button onclick="testHTTPSAPI()">Test HTTPS API</button>
    <button onclick="testLocalHTTP()">Test Local HTTP</button>
    <button onclick="testPublicAPIs()">Test Public APIs</button>
    <button onclick="clearResults()">Clear Results</button>
    
    <div id="results"></div>
    
    <script>
        const HTTPS_API = 'https://rawgle-api.findrawdogfood.workers.dev';
        const LOCAL_HTTP = 'http://localhost:8080';
        const ADMIN_TOKEN = 'rawgle-admin-2025';
        
        function addResult(type, title, message) {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `test ${type}`;
            div.innerHTML = `<h3>${title}</h3><p>${message}</p>`;
            results.appendChild(div);
        }
        
        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }
        
        async function testHTTPSAPI() {
            addResult('info', 'Testing HTTPS API', 'Testing the main Rawgle API over HTTPS...');
            
            try {
                const response = await fetch(`${HTTPS_API}/api/health`, { cache: 'no-store' });
                if (response.ok) {
                    addResult('success', 'HTTPS API Health', `✅ Success: ${response.status}`);
                    
                    // Now test the dashboard endpoint
                    try {
                        const dashResponse = await fetch(`${HTTPS_API}/api/test-management/dashboard?fallback-test=${Date.now()}`, {
                            headers: {
                                'X-Admin-Token': ADMIN_TOKEN,
                                'Content-Type': 'application/json'
                            },
                            cache: 'no-store'
                        });
                        
                        if (dashResponse.ok) {
                            addResult('success', 'HTTPS Dashboard', '🎉 Dashboard works perfectly over HTTPS!');
                        } else {
                            addResult('error', 'HTTPS Dashboard', `❌ Dashboard failed: ${dashResponse.status}`);
                        }
                    } catch (dashError) {
                        addResult('error', 'HTTPS Dashboard', `❌ Dashboard error: ${dashError.message}`);
                    }
                } else {
                    addResult('error', 'HTTPS API Health', `❌ Failed: ${response.status}`);
                }
            } catch (error) {
                addResult('error', 'HTTPS API Connection', `❌ Failed to fetch: ${error.message}`);
                
                if (error.message.includes('Failed to fetch')) {
                    addResult('info', 'Diagnosis', '🔍 "Failed to fetch" suggests network-level blocking or SSL issues');
                }
            }
        }
        
        async function testLocalHTTP() {
            addResult('info', 'Testing Local HTTP', 'Testing local HTTP server on port 8080...');
            
            try {
                const response = await fetch(`${LOCAL_HTTP}/test-management-ui.html`, { 
                    cache: 'no-store',
                    mode: 'no-cors'  // Avoid CORS for this simple test
                });
                
                addResult('success', 'Local HTTP', '✅ Local server is reachable');
                
                // Test if we can reach the dashboard HTML
                try {
                    const htmlResponse = await fetch(`${LOCAL_HTTP}/cross-browser-debug.html`, { 
                        cache: 'no-store'
                    });
                    if (htmlResponse.ok) {
                        addResult('success', 'Local HTTP Files', '✅ Local HTTP files are accessible');
                    }
                } catch (e) {
                    addResult('info', 'Local HTTP Files', `Local file test: ${e.message}`);
                }
                
            } catch (error) {
                addResult('error', 'Local HTTP', `❌ Local server unreachable: ${error.message}`);
            }
        }
        
        async function testPublicAPIs() {
            addResult('info', 'Testing Public APIs', 'Testing access to known working public APIs...');
            
            const publicAPIs = [
                { name: 'GitHub API', url: 'https://api.github.com' },
                { name: 'JSONPlaceholder', url: 'https://jsonplaceholder.typicode.com/posts/1' },
                { name: 'HTTPBin', url: 'https://httpbin.org/get' },
                { name: 'Cloudflare Trace', url: 'https://cloudflare.com/cdn-cgi/trace' }
            ];
            
            for (const api of publicAPIs) {
                try {
                    const response = await fetch(api.url, { cache: 'no-store' });
                    if (response.ok) {
                        addResult('success', `Public API: ${api.name}`, `✅ Working: ${response.status}`);
                    } else {
                        addResult('error', `Public API: ${api.name}`, `❌ Failed: ${response.status}`);
                    }
                } catch (error) {
                    addResult('error', `Public API: ${api.name}`, `❌ Error: ${error.message}`);
                }
            }
            
            // Special test for Cloudflare Workers domain
            try {
                const cfResponse = await fetch('https://workers.dev', { 
                    cache: 'no-store',
                    mode: 'no-cors'
                });
                addResult('success', 'Cloudflare Workers Domain', '✅ Cloudflare Workers domain is reachable');
            } catch (error) {
                addResult('error', 'Cloudflare Workers Domain', `❌ CF Workers unreachable: ${error.message}`);
            }
        }
        
        // Show browser info
        setTimeout(() => {
            const ua = navigator.userAgent;
            let browser = 'Unknown';
            if (ua.includes('Chrome')) browser = 'Chrome';
            else if (ua.includes('Firefox')) browser = 'Firefox';
            else if (ua.includes('Safari')) browser = 'Safari';
            else if (ua.includes('Edge')) browser = 'Edge';
            
            addResult('info', 'Browser Detection', `Browser: ${browser}<br>User Agent: ${ua.substring(0, 100)}...`);
        }, 100);
    </script>
</body>
</html>
