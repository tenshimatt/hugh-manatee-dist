<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 Rawgle Testing Management Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            min-height: 100vh;
        }
        
        .header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        
        .header h1 {
            text-align: center;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .header .subtitle {
            text-align: center;
            opacity: 0.8;
            margin-top: 10px;
            font-size: 1.1em;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .controls {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .btn {
            background: linear-gradient(45deg, #FF6B6B, #4ECDC4);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
            transition: transform 0.2s;
            font-size: 14px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn.primary {
            background: linear-gradient(45deg, #4CAF50, #45a049);
        }
        
        .btn.secondary {
            background: linear-gradient(45deg, #2196F3, #1976D2);
        }
        
        .test-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .test-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 15px;
            padding: 25px;
            position: relative;
            overflow: hidden;
        }
        
        .test-card.running {
            border-color: #4ECDC4;
            box-shadow: 0 0 20px rgba(78, 205, 196, 0.3);
        }
        
        .test-card.passed {
            border-color: #4CAF50;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.3);
        }
        
        .test-card.failed {
            border-color: #FF6B6B;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.3);
        }
        
        .test-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        
        .test-id {
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .test-title {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .test-description {
            opacity: 0.8;
            margin-bottom: 10px;
            font-size: 0.9em;
            line-height: 1.4;
        }
        
        .test-meta {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            font-size: 0.85em;
        }
        
        .test-meta span {
            background: rgba(255,255,255,0.15);
            padding: 3px 8px;
            border-radius: 12px;
        }
        
        .steps {
            margin-top: 20px;
        }
        
        .step {
            background: rgba(0,0,0,0.2);
            padding: 12px 15px;
            margin: 8px 0;
            border-radius: 8px;
            border-left: 4px solid #666;
            font-size: 0.9em;
        }
        
        .step.running {
            border-left-color: #4ECDC4;
            background: rgba(78, 205, 196, 0.1);
        }
        
        .step.passed {
            border-left-color: #4CAF50;
            background: rgba(76, 175, 80, 0.1);
        }
        
        .step.failed {
            border-left-color: #FF6B6B;
            background: rgba(255, 107, 107, 0.1);
        }
        
        .step.warning {
            border-left-color: #FFC107;
            background: rgba(255, 193, 7, 0.1);
        }
        
        .step-number {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            text-align: center;
            font-size: 11px;
            line-height: 20px;
            font-weight: bold;
            margin-right: 10px;
        }
        
        .step-description {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .step-details {
            opacity: 0.9;
            font-size: 0.85em;
            margin-top: 5px;
        }
        
        .status-bar {
            background: rgba(0,0,0,0.3);
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .status-item {
            text-align: center;
        }
        
        .status-value {
            font-size: 1.8em;
            font-weight: bold;
            display: block;
        }
        
        .status-label {
            font-size: 0.8em;
            opacity: 0.8;
        }
        
        .progress-bar {
            background: rgba(255,255,255,0.2);
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            margin: 10px 0;
        }
        
        .progress-fill {
            background: linear-gradient(45deg, #4CAF50, #4ECDC4);
            height: 100%;
            transition: width 0.3s ease;
        }
        
        .log-panel {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 0.85em;
        }
        
        .log-entry {
            margin: 5px 0;
            padding: 3px 0;
        }
        
        .log-timestamp {
            opacity: 0.6;
            margin-right: 10px;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .running .step-number {
            animation: pulse 1.5s infinite;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🧪 Rawgle Testing Management Portal</h1>
        <div class="subtitle">Automated User Story & Infrastructure Testing Platform</div>
    </div>
    
    <div class="container">
        <div class="controls">
            <button class="btn primary" onclick="runAllTests()" id="runAllBtn">🚀 Run All Tests</button>
            <button class="btn secondary" onclick="runInfrastructureTests()" id="runInfraBtn">🏗️ Infrastructure Tests</button>
            <button class="btn secondary" onclick="runUserStoryTests()" id="runUserStoryBtn">📖 User Story Tests</button>
            <button class="btn" onclick="clearResults()" id="clearBtn">🗑️ Clear Results</button>
            <button class="btn" onclick="exportResults()" id="exportBtn">📊 Export Results</button>
        </div>
        
        <div class="status-bar">
            <div class="status-item">
                <span class="status-value" id="totalTests">0</span>
                <span class="status-label">Total Tests</span>
            </div>
            <div class="status-item">
                <span class="status-value" id="runningTests">0</span>
                <span class="status-label">Running</span>
            </div>
            <div class="status-item">
                <span class="status-value" id="passedTests">0</span>
                <span class="status-label">Passed</span>
            </div>
            <div class="status-item">
                <span class="status-value" id="failedTests">0</span>
                <span class="status-label">Failed</span>
            </div>
            <div class="status-item">
                <span class="status-value" id="successRate">0%</span>
                <span class="status-label">Success Rate</span>
            </div>
        </div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
        
        <div class="test-grid" id="testGrid">
            <!-- Test cards will be dynamically generated here -->
        </div>
        
        <div class="log-panel" id="logPanel" style="display: none;">
            <h3>🔍 Execution Log</h3>
            <div id="logContent"></div>
        </div>
    </div>
    
    <script type="module">
        // Test suite configuration
        const testScripts = [
            { id: '001', name: 'API Health Check', category: 'Infrastructure', priority: 'Critical' },
            { id: '002', name: 'CORS Validation', category: 'Security', priority: 'High' },
            { id: '003', name: 'Authentication System', category: 'Security', priority: 'Critical' },
            { id: '004', name: 'Dashboard Functionality', category: 'Functionality', priority: 'High' },
            { id: '005', name: 'User Story: Authentication Flow', category: 'User Stories', priority: 'High' },
            { id: '006', name: 'Infrastructure Validation', category: 'Infrastructure', priority: 'Critical' }
        ];
        
        let testResults = new Map();
        let runningTests = new Set();
        
        // Initialize the portal
        window.addEventListener('load', () => {
            initializeTestGrid();
            updateStatusBar();
            log('Testing Portal initialized successfully');
        });
        
        function initializeTestGrid() {
            const grid = document.getElementById('testGrid');
            grid.innerHTML = '';
            
            testScripts.forEach(test => {
                const card = createTestCard(test);
                grid.appendChild(card);
            });
        }
        
        function createTestCard(test) {
            const card = document.createElement('div');
            card.className = 'test-card';
            card.id = `test-${test.id}`;
            
            card.innerHTML = `
                <div class="test-header">
                    <div>
                        <div class="test-title">${test.name}</div>
                        <div class="test-description">Loading test description...</div>
                        <div class="test-meta">
                            <span>📋 ${test.category}</span>
                            <span>⚡ ${test.priority}</span>
                            <span>🔢 Test ${test.id}</span>
                        </div>
                    </div>
                    <div class="test-id">${test.id}</div>
                </div>
                <div class="controls">
                    <button class="btn" onclick="runSingleTest('${test.id}')">▶️ Run Test</button>
                    <button class="btn" onclick="viewTestScript('${test.id}')">📄 View Script</button>
                </div>
                <div class="steps" id="steps-${test.id}">
                    <div style="opacity: 0.6; font-style: italic;">Click "Run Test" to execute...</div>
                </div>
            `;
            
            // Load test description asynchronously
            loadTestDescription(test.id);
            
            return card;
        }
        
        async function loadTestDescription(testId) {
            try {
                const module = await import(`./tests/test-scripts/${testId.padStart(3, '0')}-*.js`);
                const testScript = module.default;
                
                const descElement = document.querySelector(`#test-${testId} .test-description`);
                if (descElement && testScript.description) {
                    descElement.textContent = testScript.description;
                }
            } catch (error) {
                log(`Warning: Could not load description for test ${testId}: ${error.message}`);
            }
        }
        
        async function runSingleTest(testId) {
            if (runningTests.has(testId)) {
                log(`Test ${testId} is already running`);
                return;
            }
            
            log(`Starting test ${testId}...`);
            runningTests.add(testId);
            
            const card = document.getElementById(`test-${testId}`);
            card.className = 'test-card running';
            
            const stepsContainer = document.getElementById(`steps-${testId}`);
            stepsContainer.innerHTML = '<div style="opacity: 0.8;">🔄 Loading test script...</div>';
            
            try {
                // Dynamically import and execute the test script
                const testFiles = {
                    '001': '001-api-health.js',
                    '002': '002-cors-validation.js', 
                    '003': '003-authentication.js',
                    '004': '004-dashboard-functionality.js',
                    '005': '005-user-story-auth.js',
                    '006': '006-infrastructure-validation.js'
                };
                
                const fileName = testFiles[testId];
                if (!fileName) {
                    throw new Error(`Test script not found for ID: ${testId}`);
                }
                
                const module = await import(`./tests/test-scripts/${fileName}`);
                const testScript = module.default;
                
                log(`Executing test ${testId}: ${testScript.name}`);
                
                // Execute the test and get results
                const results = await testScript.execute();
                
                // Display results
                displayTestResults(testId, results);
                
                // Update test status
                const overallStatus = determineOverallStatus(results);
                card.className = `test-card ${overallStatus}`;
                
                testResults.set(testId, { status: overallStatus, results, timestamp: new Date() });
                
                log(`Test ${testId} completed: ${overallStatus}`);
                
            } catch (error) {
                log(`Test ${testId} failed to execute: ${error.message}`, 'error');
                
                stepsContainer.innerHTML = `
                    <div class="step failed">
                        <span class="step-number">!</span>
                        <div class="step-description">Execution Error</div>
                        <div class="step-details">Failed to load or execute test script: ${error.message}</div>
                    </div>
                `;
                
                card.className = 'test-card failed';
                testResults.set(testId, { status: 'failed', error: error.message, timestamp: new Date() });
            }
            
            runningTests.delete(testId);
            updateStatusBar();
        }
        
        function displayTestResults(testId, results) {
            const stepsContainer = document.getElementById(`steps-${testId}`);
            stepsContainer.innerHTML = '';
            
            results.forEach(result => {
                const step = document.createElement('div');
                step.className = `step ${result.status}`;
                
                step.innerHTML = `
                    <span class="step-number">${result.step}</span>
                    <div class="step-description">${result.description}</div>
                    ${result.details ? `<div class="step-details">${result.details}</div>` : ''}
                `;
                
                stepsContainer.appendChild(step);
            });
        }
        
        function determineOverallStatus(results) {
            const failed = results.some(r => r.status === 'failed');
            const running = results.some(r => r.status === 'running');
            
            if (running) return 'running';
            if (failed) return 'failed';
            return 'passed';
        }
        
        function updateStatusBar() {
            const total = testScripts.length;
            const running = runningTests.size;
            const completed = testResults.size;
            const passed = Array.from(testResults.values()).filter(r => r.status === 'passed').length;
            const failed = Array.from(testResults.values()).filter(r => r.status === 'failed').length;
            const successRate = completed > 0 ? Math.round((passed / completed) * 100) : 0;
            
            document.getElementById('totalTests').textContent = total;
            document.getElementById('runningTests').textContent = running;
            document.getElementById('passedTests').textContent = passed;
            document.getElementById('failedTests').textContent = failed;
            document.getElementById('successRate').textContent = successRate + '%';
            
            // Update progress bar
            const progress = (completed / total) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }
        
        async function runAllTests() {
            log('Starting full test suite execution...');
            
            const button = document.getElementById('runAllBtn');
            button.disabled = true;
            button.textContent = '🔄 Running All Tests...';
            
            // Run tests sequentially to avoid overwhelming the system
            for (const test of testScripts) {
                await runSingleTest(test.id);
                // Brief pause between tests
                await new Promise(resolve => setTimeout(resolve, 500));
            }
            
            button.disabled = false;
            button.textContent = '🚀 Run All Tests';
            
            log('Full test suite execution completed');
        }
        
        async function runInfrastructureTests() {
            log('Running infrastructure tests...');
            const infraTests = testScripts.filter(t => t.category === 'Infrastructure');
            
            for (const test of infraTests) {
                await runSingleTest(test.id);
                await new Promise(resolve => setTimeout(resolve, 300));
            }
            
            log('Infrastructure tests completed');
        }
        
        async function runUserStoryTests() {
            log('Running user story tests...');
            const userStoryTests = testScripts.filter(t => t.category === 'User Stories');
            
            for (const test of userStoryTests) {
                await runSingleTest(test.id);
                await new Promise(resolve => setTimeout(resolve, 300));
            }
            
            log('User story tests completed');
        }
        
        function clearResults() {
            testResults.clear();
            runningTests.clear();
            
            // Reset all test cards
            document.querySelectorAll('.test-card').forEach(card => {
                card.className = 'test-card';
                const stepsContainer = card.querySelector('.steps');
                stepsContainer.innerHTML = '<div style="opacity: 0.6; font-style: italic;">Click "Run Test" to execute...</div>';
            });
            
            updateStatusBar();
            document.getElementById('logContent').innerHTML = '';
            log('Results cleared, ready for new test run');
        }
        
        function exportResults() {
            if (testResults.size === 0) {
                log('No results to export');
                return;
            }
            
            const exportData = {
                timestamp: new Date().toISOString(),
                summary: {
                    total: testScripts.length,
                    completed: testResults.size,
                    passed: Array.from(testResults.values()).filter(r => r.status === 'passed').length,
                    failed: Array.from(testResults.values()).filter(r => r.status === 'failed').length
                },
                results: Object.fromEntries(testResults)
            };
            
            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `rawgle-test-results-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            
            log('Test results exported successfully');
        }
        
        function viewTestScript(testId) {
            // Open the test script file in a new tab
            const testFiles = {
                '001': '001-api-health.js',
                '002': '002-cors-validation.js',
                '003': '003-authentication.js', 
                '004': '004-dashboard-functionality.js',
                '005': '005-user-story-auth.js',
                '006': '006-infrastructure-validation.js'
            };
            
            const fileName = testFiles[testId];
            if (fileName) {
                window.open(`./tests/test-scripts/${fileName}`, '_blank');
            }
        }
        
        function log(message, level = 'info') {
            const logPanel = document.getElementById('logPanel');
            const logContent = document.getElementById('logContent');
            
            logPanel.style.display = 'block';
            
            const timestamp = new Date().toISOString().substring(11, 23);
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-timestamp">[${timestamp}]</span>${message}`;
            
            logContent.appendChild(entry);
            logContent.scrollTop = logContent.scrollHeight;
            
            console.log(`[${level.toUpperCase()}] ${message}`);
        }
        
        // Make functions globally available
        window.runSingleTest = runSingleTest;
        window.runAllTests = runAllTests;
        window.runInfrastructureTests = runInfrastructureTests;
        window.runUserStoryTests = runUserStoryTests;
        window.clearResults = clearResults;
        window.exportResults = exportResults;
        window.viewTestScript = viewTestScript;
    </script>
</body>
</html>
