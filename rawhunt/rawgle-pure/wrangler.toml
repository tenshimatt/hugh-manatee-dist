name = "rawgle-api"
main = "src/index.js"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]
minify = true

# Production environment
[env.production]
name = "rawgle-api-production"

[[env.production.d1_databases]]
binding = "DB"
database_name = "rawgle-production"
database_id = "2b486c2b-15b2-4b75-ba00-6ecd6124944b"

[[env.production.kv_namespaces]]
binding = "RAWGLE_KV"
id = "76d631ee10d149e295a6ab076c40d0b6"

[[env.production.kv_namespaces]]
binding = "SESSIONS"
id = "2f26e521c3124418b5d3f1fc8dec7819"

[[env.production.r2_buckets]]
binding = "IMAGES"
bucket_name = "rawgle-images"

[[env.production.r2_buckets]]
binding = "REPORTS"
bucket_name = "rawgle-reports"

[[env.production.durable_objects.bindings]]
name = "ANALYTICS"
class_name = "AnalyticsDurableObject"

[env.production.ai]
binding = "AI"

[env.production.vars]
ENVIRONMENT = "production"
SOLANA_MASTER_WALLET = "E9mnWdbp97pGaUTGRP743KhppWkYzkagWo7JM3hRJsHA"
PAWS_EXCHANGE_RATE = "1000"
API_VERSION = "v1"
LOG_LEVEL = "warn"
RATE_LIMIT_PER_MINUTE = "60"
MAX_PAYLOAD_SIZE = "10485760"
SESSION_TIMEOUT_HOURS = "24"
MAX_DAILY_PAWS = "500"

[env.production.placement]
mode = "smart"

[env.production.observability]
enabled = true
head_sampling_rate = 0.01

# Staging environment
[env.staging]
name = "rawgle-api-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "rawgle-staging"
database_id = "2b486c2b-15b2-4b75-ba00-6ecd6124944b"

[[env.staging.kv_namespaces]]
binding = "RAWGLE_KV"
id = "76d631ee10d149e295a6ab076c40d0b6"

[[env.staging.kv_namespaces]]
binding = "SESSIONS"
id = "2f26e521c3124418b5d3f1fc8dec7819"

[[env.staging.r2_buckets]]
binding = "IMAGES"
bucket_name = "rawgle-images-staging"

[[env.staging.r2_buckets]]
binding = "REPORTS"
bucket_name = "rawgle-reports-staging"

[[env.staging.durable_objects.bindings]]
name = "ANALYTICS"
class_name = "AnalyticsDurableObject"

[env.staging.ai]
binding = "AI"

[env.staging.vars]
ENVIRONMENT = "staging"
SOLANA_MASTER_WALLET = "E9mnWdbp97pGaUTGRP743KhppWkYzkagWo7JM3hRJsHA"
PAWS_EXCHANGE_RATE = "1000"
API_VERSION = "v1"
LOG_LEVEL = "info"
RATE_LIMIT_PER_MINUTE = "60"
MAX_PAYLOAD_SIZE = "10485760"
SESSION_TIMEOUT_HOURS = "24"
MAX_DAILY_PAWS = "500"

# Development defaults
[[d1_databases]]
binding = "DB"
database_name = "rawgle-development"
database_id = "2b486c2b-15b2-4b75-ba00-6ecd6124944b"

[[kv_namespaces]]
binding = "RAWGLE_KV"
id = "76d631ee10d149e295a6ab076c40d0b6"
preview_id = "76d631ee10d149e295a6ab076c40d0b6"

[[kv_namespaces]]
binding = "SESSIONS"
id = "2f26e521c3124418b5d3f1fc8dec7819"
preview_id = "2f26e521c3124418b5d3f1fc8dec7819"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "rawgle-images-dev"
preview_bucket_name = "rawgle-images-preview"

[[r2_buckets]]
binding = "REPORTS"
bucket_name = "rawgle-reports-dev"
preview_bucket_name = "rawgle-reports-preview"

[[durable_objects.bindings]]
name = "ANALYTICS"
class_name = "AnalyticsDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AnalyticsDurableObject"]

[ai]
binding = "AI"

[vars]
ENVIRONMENT = "development"
SOLANA_MASTER_WALLET = "E9mnWdbp97pGaUTGRP743KhppWkYzkagWo7JM3hRJsHA"
PAWS_EXCHANGE_RATE = "1000"
API_VERSION = "v1"
LOG_LEVEL = "debug"
RATE_LIMIT_PER_MINUTE = "60"
MAX_PAYLOAD_SIZE = "10485760"
SESSION_TIMEOUT_HOURS = "24"
MAX_DAILY_PAWS = "500"

[placement]
mode = "smart"

[observability]
enabled = true
head_sampling_rate = 0.01