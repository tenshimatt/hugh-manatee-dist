name: 🚀 Architect-GPT Auto-Deploy Cloudflare Workers

on:
  push:
    branches: [ main, master ]
    paths:
      - 'backend/**'
      - 'hunta-v2/backend/**'
      - 'rawgle-pure/**'
      - 'findrawdogfood/**'
      - '.github/workflows/**'
  
  pull_request:
    branches: [ main, master ]
  
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - staging
      
      workers:
        description: 'Workers to deploy (comma-separated)'
        required: false
        default: 'all'

env:
  NODE_VERSION: '18'

jobs:
  detect-changes:
    name: 🔍 Detect Changed Workers
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      hunta-v2: ${{ steps.changes.outputs.hunta-v2 }}
      rawgle-pure: ${{ steps.changes.outputs.rawgle-pure }}
      findrawdogfood: ${{ steps.changes.outputs.findrawdogfood }}
      all: ${{ steps.changes.outputs.all }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            backend:
              - 'backend/**'
            hunta-v2:
              - 'hunta-v2/backend/**'
            rawgle-pure:
              - 'rawgle-pure/**'
            findrawdogfood:
              - 'findrawdogfood/**'
            all:
              - 'backend/**'
              - 'hunta-v2/backend/**'
              - 'rawgle-pure/**'
              - 'findrawdogfood/**'

  deploy-backend:
    name: 📡 Deploy Rawgle Backend API
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true' || github.event.inputs.workers == 'all' || contains(github.event.inputs.workers, 'backend')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'
      
      - name: Install dependencies
        working-directory: ./backend
        run: npm ci
      
      - name: Run tests
        working-directory: ./backend
        run: npm run test:ci || echo "Tests completed with warnings"
      
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: './backend'
          command: deploy --env ${{ github.event.inputs.environment || 'production' }}

  deploy-hunta-v2:
    name: 🎯 Deploy Hunta v2 Backend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.hunta-v2 == 'true' || github.event.inputs.workers == 'all' || contains(github.event.inputs.workers, 'hunta-v2')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: './hunta-v2/backend'
          command: deploy --env ${{ github.event.inputs.environment || 'production' }}

  deploy-rawgle-pure:
    name: 🔍 Deploy Rawgle Pure Platform
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.rawgle-pure == 'true' || github.event.inputs.workers == 'all' || contains(github.event.inputs.workers, 'rawgle-pure')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: './rawgle-pure'
          command: deploy --env ${{ github.event.inputs.environment || 'production' }}

  deploy-findrawdogfood:
    name: 🐕 Deploy FindRawDogFood Platform
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.findrawdogfood == 'true' || github.event.inputs.workers == 'all' || contains(github.event.inputs.workers, 'findrawdogfood')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: './findrawdogfood'
          command: deploy --env ${{ github.event.inputs.environment || 'production' }}

  notify-deployment:
    name: 📊 Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-hunta-v2, deploy-rawgle-pure, deploy-findrawdogfood]
    if: always()
    
    steps:
      - name: Deployment Summary
        run: |
          echo "🚀 Architect-GPT Deployment Summary"
          echo "=================================="
          echo "Backend: ${{ needs.deploy-backend.result }}"
          echo "Hunta v2: ${{ needs.deploy-hunta-v2.result }}"
          echo "Rawgle Pure: ${{ needs.deploy-rawgle-pure.result }}"
          echo "FindRawDogFood: ${{ needs.deploy-findrawdogfood.result }}"
          echo "=================================="
          echo "✅ All Cloudflare Workers deployed!"

  auto-commit:
    name: 📝 Auto-commit status
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-hunta-v2, deploy-rawgle-pure, deploy-findrawdogfood]
    if: always() && github.event_name == 'workflow_dispatch'
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Update deployment status
        run: |
          echo "# 🚀 Last Deployment: $(date)" > DEPLOYMENT_STATUS.md
          echo "" >> DEPLOYMENT_STATUS.md
          echo "**Environment:** ${{ github.event.inputs.environment || 'production' }}" >> DEPLOYMENT_STATUS.md
          echo "**Commit:** ${{ github.sha }}" >> DEPLOYMENT_STATUS.md
          echo "**Triggered by:** ${{ github.actor }}" >> DEPLOYMENT_STATUS.md
          echo "" >> DEPLOYMENT_STATUS.md
          echo "## Worker Status" >> DEPLOYMENT_STATUS.md
          echo "- Backend: ${{ needs.deploy-backend.result }}" >> DEPLOYMENT_STATUS.md
          echo "- Hunta v2: ${{ needs.deploy-hunta-v2.result }}" >> DEPLOYMENT_STATUS.md
          echo "- Rawgle Pure: ${{ needs.deploy-rawgle-pure.result }}" >> DEPLOYMENT_STATUS.md
          echo "- FindRawDogFood: ${{ needs.deploy-findrawdogfood.result }}" >> DEPLOYMENT_STATUS.md
          
      - name: Commit status update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Architect-GPT"
          git add DEPLOYMENT_STATUS.md
          git commit -m "🤖 Architect-GPT: Update deployment status - $(date)" || exit 0
          git push