<!DOCTYPE html>
<html>
<head>
    <title>Minimal CORS Test</title>
    <meta charset="UTF-8">
    <style>body{font-family:monospace;padding:20px;} pre{background:#f5f5f5;padding:10px;}</style>
</head>
<body>
    <h1>Minimal CORS Test</h1>
    <button onclick="test()">Test Now</button>
    <div id="output"></div>
    
    <script>
    async function test() {
        const output = document.getElementById('output');
        output.innerHTML = '<p>Testing...</p>';
        
        try {
            console.log('Making request...');
            
            const response = await fetch('https://rawgle-api.findrawdogfood.workers.dev/api/test-management/dashboard', {
                headers: {
                    'X-Admin-Token': 'rawgle-admin-2025'
                }
            });
            
            console.log('Response received:', response);
            
            if (response.ok) {
                const data = await response.json();
                output.innerHTML = '<h2>SUCCESS!</h2><pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } else {
                output.innerHTML = '<h2>HTTP Error: ' + response.status + '</h2>';
            }
            
        } catch (error) {
            console.error('Fetch error:', error);
            output.innerHTML = '<h2>ERROR: ' + error.message + '</h2><p>Check browser console for details</p>';
        }
    }
    </script>
</body>
</html>
