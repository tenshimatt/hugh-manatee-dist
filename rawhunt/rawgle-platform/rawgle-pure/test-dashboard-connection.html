<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Connection Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        pre { background: #f8f9fa; padding: 15px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🧪 Rawgle Dashboard Connection Test</h1>
    
    <div id="results"></div>
    
    <script>
        const API_BASE = 'https://rawgle-api.findrawdogfood.workers.dev';
        const ADMIN_TOKEN = 'rawgle-admin-2025';
        
        const results = document.getElementById('results');
        
        function addResult(status, title, message, data = null) {
            const div = document.createElement('div');
            div.className = `status ${status}`;
            div.innerHTML = `
                <h3>${title}</h3>
                <p>${message}</p>
                ${data ? `<pre>${JSON.stringify(data, null, 2)}</pre>` : ''}
            `;
            results.appendChild(div);
        }
        
        async function testConnection() {
            addResult('info', '🔄 Starting Tests', 'Testing dashboard connection to live API...');
            
            // Test 1: Basic API health
            try {
                const healthResponse = await fetch(`${API_BASE}/api/health`);
                const healthData = await healthResponse.json();
                
                if (healthResponse.ok) {
                    addResult('success', '✅ API Health Check', 'Basic API connectivity working', healthData);
                } else {
                    addResult('error', '❌ API Health Check', 'API health check failed', healthData);
                    return;
                }
            } catch (error) {
                addResult('error', '❌ API Health Check', `Connection failed: ${error.message}`);
                return;
            }
            
            // Test 2: Admin token authentication
            try {
                const dashboardResponse = await fetch(`${API_BASE}/api/test-management/dashboard`, {
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Admin-Token': ADMIN_TOKEN
                    }
                });
                
                const dashboardData = await dashboardResponse.json();
                
                if (dashboardResponse.ok) {
                    addResult('success', '✅ Dashboard API Access', 'Admin authentication working', dashboardData);
                } else {
                    addResult('error', '❌ Dashboard API Access', 
                        `Authentication failed (${dashboardResponse.status}): ${dashboardResponse.statusText}`, 
                        dashboardData);
                }
            } catch (error) {
                addResult('error', '❌ Dashboard API Access', `Request failed: ${error.message}`);
            }
            
            // Test 3: CORS headers
            try {
                const corsResponse = await fetch(`${API_BASE}/api/health`, {
                    method: 'OPTIONS',
                    headers: {
                        'Origin': window.location.origin,
                        'Access-Control-Request-Method': 'GET',
                        'Access-Control-Request-Headers': 'X-Admin-Token'
                    }
                });
                
                if (corsResponse.ok) {
                    addResult('success', '✅ CORS Configuration', 'Cross-origin requests properly configured');
                } else {
                    addResult('error', '❌ CORS Configuration', 'CORS preflight failed');
                }
            } catch (error) {
                addResult('error', '❌ CORS Configuration', `CORS test failed: ${error.message}`);
            }
            
            // Test 4: Check if main dashboard loads
            addResult('info', '🔗 Dashboard Access', 
                'If all tests above passed, the main dashboard should work with:<br>' +
                `<strong>URL:</strong> <a href="test-management-ui.html">test-management-ui.html</a><br>` +
                `<strong>Admin Token:</strong> ${ADMIN_TOKEN}`);
        }
        
        // Run tests when page loads
        testConnection();
    </script>
</body>
</html>
