<!DOCTYPE html>
<html>
<head>
    <title>Simple Dashboard Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .result { margin: 10px 0; padding: 15px; border-radius: 5px; }
        .success { background: #d4edda; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; border: 1px solid #bee5eb; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; }
        button { padding: 10px 20px; margin: 5px; border: none; border-radius: 5px; cursor: pointer; }
        .btn-primary { background: #007bff; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        input { padding: 8px; margin: 5px; border: 1px solid #ccc; border-radius: 3px; width: 300px; }
    </style>
</head>
<body>
    <h1>🧪 Simple Dashboard Connection Test</h1>
    
    <div class="info">
        <h3>Configuration</h3>
        <p><strong>API Base:</strong> <span id="api-base"></span></p>
        <p><strong>Admin Token:</strong> <input type="text" id="token-input" placeholder="Enter admin token"> 
           <button class="btn-primary" onclick="setToken()">Set Token</button></p>
        <button class="btn-danger" onclick="clearToken()">Clear Stored Token</button>
    </div>
    
    <div>
        <button class="btn-primary" onclick="testConnection()">🔍 Test Connection</button>
        <button class="btn-primary" onclick="loadDashboard()">📊 Load Dashboard Data</button>
    </div>
    
    <div id="results"></div>
    
    <script>
        const API_BASE = 'https://rawgle-api.findrawdogfood.workers.dev';
        let ADMIN_TOKEN = localStorage.getItem('admin-token') || '';
        
        document.getElementById('api-base').textContent = API_BASE;
        document.getElementById('token-input').value = ADMIN_TOKEN;
        
        function addResult(type, title, message, data = null) {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.innerHTML = `
                <h4>${title}</h4>
                <p>${message}</p>
                ${data ? `<pre>${typeof data === 'string' ? data : JSON.stringify(data, null, 2)}</pre>` : ''}
            `;
            results.appendChild(div);
        }
        
        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }
        
        function setToken() {
            const token = document.getElementById('token-input').value.trim();
            if (token) {
                ADMIN_TOKEN = token;
                localStorage.setItem('admin-token', token);
                addResult('success', '✅ Token Set', `Admin token updated: ${token}`);
            } else {
                addResult('error', '❌ Invalid Token', 'Please enter a valid admin token');
            }
        }
        
        function clearToken() {
            ADMIN_TOKEN = '';
            localStorage.removeItem('admin-token');
            document.getElementById('token-input').value = '';
            addResult('info', '🗑️ Token Cleared', 'Admin token cleared from storage');
        }
        
        async function testConnection() {
            clearResults();
            addResult('info', '🔄 Testing Connection', 'Starting connection tests...');
            
            // Test 1: Health check
            try {
                const healthResponse = await fetch(`${API_BASE}/api/health`);
                const healthData = await healthResponse.json();
                addResult('success', '✅ Health Check', `API is responding: ${healthData.status}`, healthData);
            } catch (error) {
                addResult('error', '❌ Health Check Failed', `Cannot connect to API: ${error.message}`);
                return;
            }
            
            // Test 2: Authentication
            if (!ADMIN_TOKEN) {
                addResult('error', '❌ Missing Token', 'Please set an admin token before testing dashboard access');
                return;
            }
            
            try {
                const dashResponse = await fetch(`${API_BASE}/api/test-management/dashboard`, {
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Admin-Token': ADMIN_TOKEN
                    }
                });
                
                if (dashResponse.ok) {
                    const dashData = await dashResponse.json();
                    addResult('success', '✅ Dashboard Access', 'Authentication successful', dashData);
                } else {
                    const errorData = await dashResponse.json().catch(() => ({}));
                    addResult('error', '❌ Dashboard Access Failed', 
                        `HTTP ${dashResponse.status}: ${dashResponse.statusText}`, errorData);
                }
            } catch (error) {
                addResult('error', '❌ Dashboard Request Failed', `Request error: ${error.message}`);
            }
        }
        
        async function loadDashboard() {
            if (!ADMIN_TOKEN) {
                addResult('error', '❌ Missing Token', 'Please set an admin token first');
                return;
            }
            
            clearResults();
            addResult('info', '🔄 Loading Dashboard', 'Fetching dashboard data...');
            
            try {
                const response = await fetch(`${API_BASE}/api/test-management/dashboard?timeframe=7d`, {
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Admin-Token': ADMIN_TOKEN
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    addResult('success', '✅ Dashboard Data Loaded', 'Successfully loaded dashboard data', data);
                    
                    // Show summary
                    addResult('info', '📊 Dashboard Summary', 
                        `Total Runs: ${data.overview.totalRuns}, Success Rate: ${data.overview.successRate}%, Trends: ${data.trends.length} days`);
                } else {
                    const errorData = await response.json().catch(() => ({}));
                    addResult('error', '❌ Dashboard Load Failed', 
                        `HTTP ${response.status}: ${response.statusText}`, errorData);
                }
            } catch (error) {
                addResult('error', '❌ Dashboard Request Failed', `Network or request error: ${error.message}`);
            }
        }
        
        // Auto-test on load if token is available
        if (ADMIN_TOKEN) {
            setTimeout(testConnection, 1000);
        }
    </script>
</body>
</html>
