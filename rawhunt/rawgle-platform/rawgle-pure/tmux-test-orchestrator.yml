# RAWGLE PLATFORM - TMUX TEST ORCHESTRATION
# Multi-agent system to fix 109/125 failing tests
# Status: CRITICAL - 87% failure rate requires systematic rebuild

name: rawgle-test-fix
root: /Users/mattwright/pandora/rawgle-platform/rawgle-pure

# Pre-execution setup
pre_window: |
  echo "🚨 RAWGLE TEST ORCHESTRATION STARTING"
  echo "📊 Current Status: 109/125 tests failing (87%)"
  echo "🎯 Target: Fix all failing tests systematically"
  date

windows:
  # === ANALYSIS & COORDINATION WINDOW ===
  - window_name: coordination
    layout: main-vertical
    panes:
      - pane_name: master-coordinator
        commands:
          - echo "🎯 MASTER COORDINATOR - Test Failure Analysis"
          - echo "Loading test results from previous run..."
          - ls -la tests/test-scripts/ | wc -l
          - echo "Analyzing failure patterns..."
          - tail -f /tmp/tmux-coordination.log 2>/dev/null || echo "Starting coordination log"
      
      - pane_name: test-status-monitor
        commands:
          - echo "📊 REAL-TIME TEST STATUS MONITOR"
          - echo "Watching test execution and results..."
          - watch -n 5 'echo "=== LIVE TEST COUNT ===" && find tests/test-scripts -name "*.js" | wc -l && echo "Expected: 125"'

  # === BACKEND REPAIR AGENTS ===
  - window_name: backend-agents
    layout: even-horizontal
    panes:
      - pane_name: auth-repair-agent
        commands:
          - echo "🔐 AUTH REPAIR AGENT"
          - echo "Fixing authentication endpoints..."
          - echo "Target tests: 003, 011-020, 024, 084-089"
          - npx wrangler tail rawgle-api --format=pretty | grep -E "(auth|login|register)" || echo "Monitoring auth endpoints"
      
      - pane_name: api-repair-agent
        commands:
          - echo "🔧 API REPAIR AGENT"
          - echo "Fixing core API endpoints..."
          - echo "Target tests: 001-007, 025-043, 079-083"
          - curl -s https://rawgle-api.findrawdogfood.workers.dev/api/health | jq .
      
      - pane_name: database-repair-agent
        commands:
          - echo "🗄️ DATABASE REPAIR AGENT"
          - echo "Fixing D1 schema and queries..."
          - echo "Target tests: Database-dependent tests"
          - npx wrangler d1 execute rawgle-production --remote --command="SELECT name FROM sqlite_master WHERE type='table';"

  # === FEATURE REPAIR AGENTS ===
  - window_name: feature-agents
    layout: even-horizontal
    panes:
      - pane_name: paws-repair-agent
        commands:
          - echo "💰 PAWS SYSTEM REPAIR AGENT"
          - echo "Fixing PAWS balance, rewards, transfers..."
          - echo "Target tests: 008-043"
          - curl -s "https://rawgle-api.findrawdogfood.workers.dev/api/paws/balance?userId=test" || echo "PAWS endpoint needs repair"
      
      - pane_name: ai-medical-repair-agent
        commands:
          - echo "🏥 AI MEDICAL REPAIR AGENT"
          - echo "Fixing AI consultation endpoints..."
          - echo "Target tests: 044-058, 107"
          - curl -s -X POST https://rawgle-api.findrawdogfood.workers.dev/api/ai-medical -H "Content-Type: application/json" -d '{"test":"endpoint"}' || echo "AI Medical needs repair"
      
      - pane_name: nft-repair-agent
        commands:
          - echo "🎨 NFT SYSTEM REPAIR AGENT"
          - echo "Fixing NFT minting and marketplace..."
          - echo "Target tests: 059-078, 108"
          - curl -s https://rawgle-api.findrawdogfood.workers.dev/api/nft || echo "NFT endpoints need repair"

  # === TEST SCRIPT GENERATION AGENTS ===
  - window_name: test-generators
    layout: main-horizontal
    panes:
      - pane_name: missing-test-generator
        commands:
          - echo "📝 MISSING TEST GENERATOR"
          - echo "Generating 64+ missing test script files..."
          - echo "Current test files:"
          - find tests/test-scripts -name "*.js" -type f | sort
          - echo "Expected: 125 files (001-125)"
      
      - pane_name: test-validator
        commands:
          - echo "✅ TEST VALIDATOR"
          - echo "Validating generated test scripts..."
          - echo "Checking syntax and API calls..."
          - find tests/test-scripts -name "*.js" -exec node -c {} \; 2>&1 | head -20

  # === SECURITY & PERFORMANCE AGENTS ===
  - window_name: security-performance
    layout: even-horizontal
    panes:
      - pane_name: security-repair-agent
        commands:
          - echo "🔒 SECURITY REPAIR AGENT"
          - echo "Fixing security tests and vulnerabilities..."
          - echo "Target tests: 079-102"
          - curl -s -H "X-Test: SQL-Injection-Test" https://rawgle-api.findrawdogfood.workers.dev/api/health
      
      - pane_name: performance-repair-agent
        commands:
          - echo "⚡ PERFORMANCE REPAIR AGENT"
          - echo "Fixing performance and load tests..."
          - echo "Target tests: 113-125"
          - curl -s -w "%{time_total}" https://rawgle-api.findrawdogfood.workers.dev/api/health

  # === FRONTEND REPAIR WINDOW ===
  - window_name: frontend-repair
    layout: main-vertical
    panes:
      - pane_name: frontend-connectivity-agent
        commands:
          - echo "🌐 FRONTEND CONNECTIVITY AGENT"
          - echo "Fixing frontend-backend integration..."
          - curl -s https://5dc2641e.rawgle-platform.pages.dev | head -20
      
      - pane_name: frontend-build-agent
        commands:
          - echo "🏗️ FRONTEND BUILD AGENT"
          - echo "Rebuilding frontend with proper API connections..."
          - npm run build
          - echo "Frontend built, checking for errors..."

  # === DEPLOYMENT & VALIDATION WINDOW ===
  - window_name: deployment-validation
    layout: even-horizontal
    panes:
      - pane_name: deployment-agent
        commands:
          - echo "🚀 DEPLOYMENT AGENT"
          - echo "Coordinating backend and frontend deployments..."
          - echo "Watching for changes and auto-deploying..."
          - watch -n 10 'git status --porcelain | wc -l'
      
      - pane_name: final-test-runner
        commands:
          - echo "🧪 FINAL TEST RUNNER"
          - echo "Running complete test suite validation..."
          - echo "Will execute all 125 tests once repairs are complete"
          - echo "Target: 0 failures, 125 passing"

  # === LIVE MONITORING WINDOW ===
  - window_name: live-monitoring
    layout: main-horizontal
    panes:
      - pane_name: api-logs
        commands:
          - echo "📡 LIVE API LOGS"
          - npx wrangler tail rawgle-api --format=pretty
      
      - pane_name: error-tracker
        commands:
          - echo "🚨 ERROR TRACKER"
          - echo "Monitoring for errors across all systems..."
          - tail -f /var/log/system.log 2>/dev/null || echo "Monitoring system errors..."

# Post-execution
post: |
  echo "🎯 TMUX ORCHESTRATION SETUP COMPLETE"
  echo "📋 All agent windows created"
  echo "🔄 Systematic test repair process initiated"
  echo "📊 Goal: Fix 109/125 failing tests (87% failure rate)"
  echo ""
  echo "AGENT ASSIGNMENTS:"
  echo "- Auth Repair: Tests 003, 011-020, 024, 084-089"
  echo "- API Repair: Tests 001-007, 025-043, 079-083" 
  echo "- PAWS Repair: Tests 008-043"
  echo "- AI Medical: Tests 044-058, 107"
  echo "- NFT Repair: Tests 059-078, 108"
  echo "- Security: Tests 079-102"
  echo "- Performance: Tests 113-125"
  echo "- Missing Files: Generate 64+ missing test scripts"
  echo ""
  echo "🚀 Ready to execute systematic repairs!"