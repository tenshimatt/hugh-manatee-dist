name = "rawgle-api"
main = "src/index.js"
compatibility_date = "2024-08-12"
compatibility_flags = ["nodejs_compat"]
minify = true

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "rawgle-production"
database_id = "2b486c2b-15b2-4b75-ba00-6ecd6124944b"

# KV Namespaces
[[kv_namespaces]]
binding = "RAWGLE_KV"
id = "76d631ee10d149e295a6ab076c40d0b6"

[[kv_namespaces]]
binding = "SESSIONS"
id = "fa2f4fbd6cec49518d005769c8c3d0e3"

# Workers AI
[ai]
binding = "AI"

# Environment variables
[vars]
ENVIRONMENT = "production"
SOLANA_MASTER_WALLET = "E9mnWdbp97pGaUTGRP743KhppWkYzkagWo7JM3hRJsHA"
PAWS_EXCHANGE_RATE = "1000"
API_VERSION = "v1"
LOG_LEVEL = "info"
RATE_LIMIT_PER_MINUTE = "60"
MAX_PAYLOAD_SIZE = "10485760"
SESSION_TIMEOUT_HOURS = "24"
MAX_DAILY_PAWS = "500"

# Placement
[placement]
mode = "smart"

# Limits removed for Free plan
# [limits]
# cpu_ms = 30000

# Observability removed for Free plan
# [observability]
# enabled = true
# head_sampling_rate = 0.01