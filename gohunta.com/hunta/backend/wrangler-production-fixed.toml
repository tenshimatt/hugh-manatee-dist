name = "hunta-backend-prod"
main = "workers/index.js"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
JWT_SECRET = "hunta-production-jwt-secret-change-me"
UPLOAD_LIMIT = "10485760"

[[d1_databases]]
binding = "DB"
database_name = "hunta-db-prod"
database_id = "8a950a6b-e1c8-4ac0-97bc-ad93c75450b6"

[[kv_namespaces]]
binding = "CACHE"
id = "REPLACE_WITH_ACTUAL_KV_ID"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "hunta-media-prod"

# Routes for custom domain
routes = [
  { pattern = "gohunta.com/api/*", zone_name = "gohunta.com" },
  { pattern = "api.gohunta.com/*", zone_name = "gohunta.com" }
]